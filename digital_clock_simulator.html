<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Gaming Room & IoT Simulator</title>
  <script>
    // Global process env simulation for Framer Motion
    window.process = { env: { NODE_ENV: 'production' } };

    // Global script load error tracking
    window.failedScripts = [];
    window.handleScriptError = function(name, url) {
      window.failedScripts.push(name + ' (' + url + ')');
      showErrorAlert();
    };

    // Global runtime error handler
    window.onerror = function(message, source, lineno, colno, error) {
      var errText = 'Runtime Error: ' + message + '\nSource: ' + source + '\nLine: ' + lineno + ', Col: ' + colno;
      console.error(errText);
      showErrorAlert(errText);
      return false;
    };

    function showErrorAlert(customMessage) {
      function show() {
        if (!document.body) {
          setTimeout(show, 50);
          return;
        }
        var errorDiv = document.getElementById('error-display');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'error-display';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '10px';
          errorDiv.style.left = '50%';
          errorDiv.style.transform = 'translateX(-50%)';
          errorDiv.style.width = '90%';
          errorDiv.style.maxWidth = '600px';
          errorDiv.style.background = '#fef2f2';
          errorDiv.style.color = '#991b1b';
          errorDiv.style.padding = '16px';
          errorDiv.style.borderRadius = '12px';
          errorDiv.style.border = '1px solid #fca5a5';
          errorDiv.style.boxShadow = '0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05)';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '12px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.innerHTML = '<h3 style="font-weight: bold; font-size: 14px; margin-bottom: 8px;">🚨 LỖI HỆ THỐNG / SYSTEM ERROR</h3>' +
                               '<p style="margin-bottom: 12px; color: #7f1d1d;">Trình giả lập không thể khởi chạy. Dưới đây là thông tin chi tiết để gỡ lỗi:</p>' +
                               '<div id="error-details" style="background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #fee2e2; max-height: 200px; overflow-y: auto;"></div>' +
                               '<button onclick="window.location.reload(true)" style="margin-top: 12px; padding: 6px 12px; background: #991b1b; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Tải Lại Trang (Reload)</button>';
          document.body.appendChild(errorDiv);
        }
        
        var detailsDiv = document.getElementById('error-details');
        if (detailsDiv) {
          var html = '';
          if (window.failedScripts.length > 0) {
            html += '<strong>Không thể tải thư viện (CDN Blocked/Slow):</strong>\n' + window.failedScripts.join('\n') + '\n\n';
          }
          if (customMessage) {
            html += '<strong>Lỗi thực thi (JS Crash):</strong>\n' + customMessage;
          }
          detailsDiv.innerHTML = html.replace(/\n/g, '<br>');
        }
      }
      show();
    }
  </script>
  
  <!-- Tailwind CSS CDN (v4 Play CDN via jsDelivr) -->

    }

      text-shadow: 0 0 6px rgba(253, 224, 71, 0.75), 0 0 12px rgba(253, 224, 71, 0.4);
    }
    .lcd-screen-scanline {
      background-size: 100% 4px;
      background-image: linear-gradient(rgba(0, 0, 0, 0.08) 50%, transparent 50%);

    .retro-btn-active:active {
      transform: translateY(1.5px) scale(0.96);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    }
    /* Custom scrollbar for mock terminal */
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
    }

      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Device animations */
    @keyframes spin-turbo {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-turbo {
      animation: spin-turbo 0.4s linear infinite;
    }
    
    @keyframes rainbow-glow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    .animate-rainbow {
      animation: rainbow-glow 4s linear infinite;
    }

    /* Soundwave bars animation */
    @keyframes bounce-bar {
      0%, 100% { height: 4px; }
      50% { height: 28px; }
    }
    .wave-bar {
      width: 3px;
      background-color: #8b5cf6;
      border-radius: 9999px;
      transition: height 0.1s ease;

    .wave-bar-active {
      animation: bounce-bar 0.8s ease-in-out infinite;

    .wave-bar-active:nth-child(2) { animation-delay: 0.15s; }
    .wave-bar-active:nth-child(3) { animation-delay: 0.3s; }
    .wave-bar-active:nth-child(4) { animation-delay: 0.05s; }
    .wave-bar-active:nth-child(5) { animation-delay: 0.2s; }

    /* SVG wire highlight on hover */
    .svg-wire {
      transition: stroke 0.2s, stroke-width 0.2s;
    }
    .svg-wire:hover {
      stroke: #a78bfa !important;
      stroke-width: 3.5px !important;
      cursor: pointer;
    }
    .svg-pin:hover {
      fill: #8b5cf6 !important;
      cursor: pointer;
    }
  </style>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-100 min-h-[100dvh] transition-colors duration-300 flex items-center justify-center p-4 md:p-6 font-sans">
  <div id="root" class="w-full max-w-6xl"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // Safety check for Framer Motion availability
    let motionObj = window.Motion;
    if (!motionObj || !motionObj.motion || !motionObj.AnimatePresence) {
      const createMockComponent = (Tag) => {
        return React.forwardRef(({ children, whileHover, whileTap, transition, animate, initial, exit, ...props }, ref) => (
          <Tag ref={ref} {...props}>{children}</Tag>
        ));
      };
      motionObj = {
        motion: {
          div: createMockComponent('div'),
          button: createMockComponent('button')
        },
        AnimatePresence: ({ children }) => <>{children}</>
      };
    }
    const { motion, AnimatePresence } = motionObj;

    // State Machine modes matching C++ firmware
    const MODES = {
      DISPLAY: 'DISPLAY',
      SET_HOUR: 'SET_HOUR',
      SET_MINUTE: 'SET_MINUTE',
      SET_ALARM_HOUR: 'SET_ALARM_HOUR',
      SET_ALARM_MINUTE: 'SET_ALARM_MINUTE',
      RULE_SELECT: 'RULE_SELECT',
      RULE_HOUR: 'RULE_HOUR',
      RULE_MIN: 'RULE_MIN',
      RULE_DEV: 'RULE_DEV',
      RULE_ACT: 'RULE_ACT'
    };

    function App() {
      // General UX Theme
      const [theme, setTheme] = useState('dark');
      const [activeTab, setActiveTab] = useState('console'); // 'console', 'schematic', 'guide'

      // Clock and simulated RTC time offsets
      const [rtcTime, setRtcTime] = useState(new Date());
      const [timeOffset, setTimeOffset] = useState(0); 
      const [currentMode, setCurrentMode] = useState(MODES.DISPLAY);
      
      // Temporary values during LCD editing
      const [tempHour, setTempHour] = useState(12);
      const [tempMinute, setTempMinute] = useState(0);
      const [tempRuleIdx, setTempRuleIdx] = useState(0); // 0 to 3 for R1-R4

      // LCD state
      const [alternateState, setAlternateState] = useState('DATE'); // 'DATE', 'RELAYS', or 'NEXT_TASK'
      const [blinkState, setBlinkState] = useState(true);
      const [lcdBacklight, setLcdBacklight] = useState(true); 
      const [lcdColor, setLcdColor] = useState('blue'); 

      // Simulated IoT Devices (Controlled by Relays D10-D13)
      const [devices, setDevices] = useState([
        { id: 'led', name: 'Đèn LED Gaming', pin: 'D10', state: false, color: 'text-violet-500 bg-violet-500/10 border-violet-500/30', activeColor: 'purple', ledMode: 'solid' },
        { id: 'fan', name: 'Quạt PC Turbo', pin: 'D11', state: false, color: 'text-cyan-500 bg-cyan-500/10 border-cyan-500/30' },
        { id: 'lock', name: 'Khóa Cửa Phòng', pin: 'D12', state: true, color: 'text-rose-500 bg-rose-500/10 border-rose-500/30' },
        { id: 'lamp', name: 'Đèn Ngủ Cozy', pin: 'D13', state: false, color: 'text-amber-500 bg-amber-500/10 border-amber-500/30' }
      ]);

      // Scheduled IoT Automation Rules (Stored in simulated EEPROM)
      // Mapped to pins and actions: 1 = ON, 0 = OFF, 2 = Disabled
      const [rules, setRules] = useState([
        { id: 1, hour: 7, minute: 0, pin: 10, action: 1, active: true },
        { id: 2, hour: 8, minute: 30, pin: 10, action: 0, active: true },
        { id: 3, hour: 18, minute: 0, pin: 11, action: 1, active: true },
        { id: 4, hour: 22, minute: 0, pin: 11, action: 0, active: true }
      ]);

      // Alarm states (Classic buzzer alarm)
      const [alarmHour, setAlarmHour] = useState(7);
      const [alarmMinute, setAlarmMinute] = useState(0);
      const [alarmEnabled, setAlarmEnabled] = useState(true);
      const [alarmRinging, setAlarmRinging] = useState(false);

      // Voice AI Assistant States
      const [isListening, setIsListening] = useState(false);
      const [interimTranscript, setInterimTranscript] = useState('');
      const [chatHistory, setChatHistory] = useState([
        { sender: 'bot', text: 'Xin chào! Tôi là Trợ lý Giọng nói Gaming Room. Bạn có thể ra lệnh bật/tắt thiết bị hoặc đổi màu đèn led bằng tiếng Việt (ví dụ: "bật đèn gaming", "đổi đèn màu đỏ", "chạy quạt turbo", "hát đi"...)' }
      ]);
      const chatContainerRef = useRef(null);

      // Web Audio / Rickroll States
      const [rickrollPlaying, setRickrollPlaying] = useState(false);
      const [rickrollLyric, setRickrollLyric] = useState("");
      const rickrollIntervalRef = useRef(null);
      const rickrollNoteIndexRef = useRef(0);

      // Terminal Logs (Simulating Arduino Serial Monitor)
      const [logs, setLogs] = useState([
        { time: new Date().toLocaleTimeString(), text: '=== IoT Gaming Room Hub ===' },
        { time: new Date().toLocaleTimeString(), text: 'Initializing system...' },
        { time: new Date().toLocaleTimeString(), text: 'RTC DS3231 initialized OK.' },
        { time: new Date().toLocaleTimeString(), text: 'Output Pins D10, D11, D12, D13 configured.' },
        { time: new Date().toLocaleTimeString(), text: '[EEPROM] Loaded 4 rules successfully.' },
        { time: new Date().toLocaleTimeString(), text: 'System operational.' }
      ]);
      const terminalContainerRef = useRef(null);

      // Interactive wiring schematic description state
      const [wireInfo, setWireInfo] = useState("Click vào bất cứ sợi dây hoặc chân linh kiện nào trên sơ đồ để xem thông tin kết nối và ý nghĩa của nó.");

      // Web Audio API References
      const audioCtxRef = useRef(null);
      const alarmIntervalRef = useRef(null);
      const recognitionRef = useRef(null);
      const handleVoiceCommandRef = useRef(null);
      const isListeningRef = useRef(false);
      const isFirstStartRef = useRef(true);
      const latestTranscriptRef = useRef('');
      const silenceTimerRef = useRef(null);

      const addLog = (text) => {
        setLogs(prev => [...prev.slice(-40), {
          time: new Date().toLocaleTimeString(),
          text: text
        }]);
      };

      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [theme]);

      useEffect(() => {
        isListeningRef.current = isListening;
      }, [isListening]);

      useEffect(() => {
        if (terminalContainerRef.current) {
          terminalContainerRef.current.scrollTo({
            top: terminalContainerRef.current.scrollHeight,
            behavior: 'smooth'
          });
        }
      }, [logs]);

      useEffect(() => {
        if (chatContainerRef.current) {
          const scrollBehavior = interimTranscript ? 'auto' : 'smooth';
          chatContainerRef.current.scrollTo({
            top: chatContainerRef.current.scrollHeight,
            behavior: scrollBehavior
          });
        }
      }, [chatHistory, interimTranscript]);

      // Blink timer for LCD cursor
      useEffect(() => {
        const interval = setInterval(() => {
          setBlinkState(prev => !prev);
        }, 505);
        return () => clearInterval(interval);
      }, []);

      // Rotate LCD Line 2 every 3 seconds
      useEffect(() => {
        if (currentMode !== MODES.DISPLAY || rickrollPlaying) return;
        const interval = setInterval(() => {
          setAlternateState(prev => {
            if (prev === 'DATE') return 'RELAYS';
            if (prev === 'RELAYS') return 'NEXT_TASK';
            return 'DATE';
          });
        }, 3000);
        return () => clearInterval(interval);
      }, [currentMode, rickrollPlaying]);

      // Clock loop: Updates RTC and checks triggers
      useEffect(() => {
        const interval = setInterval(() => {
          const simulatedTime = new Date(Date.now() + timeOffset);
          setRtcTime(simulatedTime);

          const h = simulatedTime.getHours();
          const m = simulatedTime.getMinutes();
          const s = simulatedTime.getSeconds();

          // Check scheduler rules at exactly 0 seconds
          if (s === 0) {
            rules.forEach((rule, idx) => {
              if (rule.active && rule.hour === h && rule.minute === m) {
                // Execute rule
                const state = (rule.action === 1);
                setDevices(prev => prev.map(dev => {
                  const pinNum = parseInt(dev.pin.substring(1));
                  if (pinNum === rule.pin) {
                    addLog(`[SCHEDULER] Triggered Rule ${idx + 1}: Pin D${rule.pin} -> ${state ? 'ON' : 'OFF'}`);
                    return { ...dev, state };
                  }
                  return dev;
                }));
              }
            });
          }

          // Check simple alarm trigger
          if (alarmEnabled && h === alarmHour && m === alarmMinute && s === 0 && !alarmRinging && !rickrollPlaying) {
            setAlarmRinging(true);
            addLog(`*** ALARM RINGING! ***`);
          }
        }, 200);
        return () => clearInterval(interval);
      }, [timeOffset, alarmEnabled, alarmHour, alarmMinute, alarmRinging, rickrollPlaying, rules]);

      // Voice recognition setup
      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          const rec = new SpeechRecognition();
          rec.continuous = false;
          rec.interimResults = true;
          rec.lang = 'vi-VN';

          rec.onstart = () => {
            setIsListening(true);
            setInterimTranscript('');
            addLog('[VOICE] Microphone listening (vi-VN)...');
            if (isFirstStartRef.current) {
              setChatHistory(prev => [...prev, { sender: 'voice-status', text: 'Microphone đang hoạt động. Hãy nói...' }]);
              isFirstStartRef.current = false;
            }
          };

          rec.onend = () => {
            setInterimTranscript('');
            if (isListeningRef.current) {
              addLog('[VOICE] Session ended. Auto-restarting...');
              try {
                rec.start();
              } catch (e) {
                console.error("Auto-restart failed:", e);
                setIsListening(false);
              }
            } else {
              setIsListening(false);
            }
          };

          rec.onerror = (e) => {
            if (!isListeningRef.current) return; // Prioritize manual stop: ignore events if already inactive
            console.error(e);
            addLog(`[VOICE] Error: ${e.error}`);
            
            if (e.error === 'aborted') {
              return; // Ignore aborted error to avoid showing red warning on manual stop
            }
            
            if (e.error === 'no-speech') {
              return; // Ignore no-speech error to let it auto-restart in onend
            }
            
            setIsListening(false);
            setInterimTranscript('');
            
            let userFriendlyMsg = `Lỗi nhận diện giọng nói: ${e.error}`;
            if (e.error === 'network') {
              userFriendlyMsg = 'Mạng không ổn định hoặc bị chặn (Error: network). Hãy thử tắt VPN, kiểm tra mạng, hoặc dùng Microsoft Edge.';
            } else if (e.error === 'not-allowed') {
              userFriendlyMsg = 'Chưa cấp quyền micro. Hãy nhấp vào ổ khóa cạnh URL và chọn Cho phép (Allow) Microphone.';
            } else if (e.error === 'audio-capture') {
              userFriendlyMsg = 'Không tìm thấy thiết bị thu âm (Error: audio-capture).';
            }
            setChatHistory(prev => [...prev, { sender: 'voice-error', text: userFriendlyMsg }]);
          };

          rec.onresult = (event) => {
            if (!isListeningRef.current) return; // Prioritize manual stop: ignore events if already inactive
            let interim = '';
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) {
                final += transcript;
              } else {
                interim += transcript;
              }
            }
            
            const currentFullText = final + interim;
            if (currentFullText) {
              setInterimTranscript(currentFullText);
              // Log directly to the simulated serial monitor for verification
              addLog(`[VOICE LIVE] "${currentFullText}" (${interim ? 'đang nghe...' : 'đã dứt câu'})`);
            }
            
            if (final && !interim) {
              setInterimTranscript('');
              handleVoiceCommandRef.current?.(final);
            }
          };

          recognitionRef.current = rec;
        }
      }, []);

      // Speak response out loud using Web Speech Synthesis
      const speakResponse = (text) => {
        try {
          if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            const voices = window.speechSynthesis.getVoices();
            const viVoice = voices.find(v => v.lang.includes('vi') || v.lang.includes('VI'));
            if (viVoice) {
              utterance.voice = viVoice;
            }
            window.speechSynthesis.speak(utterance);
          }
        } catch (e) {
          console.error(e);
        }
      };

      // Voice commands NLP matcher
      const handleVoiceCommand = (text) => {
        setChatHistory(prev => [...prev, { sender: 'user', text }]);
        const cleanText = text.toLowerCase().trim();
        addLog(`[VOICE IN] "${text}"`);
        let responseText = "";
        let commandToSend = "";
        
        const matchesWords = (text, keywords) => keywords.some(kw => text.includes(kw));

        // NLP Matching Logic
        // Kiểm tra xem có yêu cầu hẹn giờ/lập lịch hay không (ví dụ: "lúc 18 giờ 30")
        const timeMatch = cleanText.match(/lúc\s*(\d+)\s*giờ\s*(\d+)?/);
        if (timeMatch) {
          const hr = parseInt(timeMatch[1]);
          const mn = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
          
          if (hr >= 0 && hr <= 23 && mn >= 0 && mn <= 59) {
            let deviceId = "";
            let action = -1; 
            let devicePin = 10;
            let deviceLabel = "";

            const isAll = matchesWords(cleanText, ["tất cả", "hết", "mọi thứ", "all", "cả phòng"]);
            const isBothLights = (cleanText.includes("cả hai") && cleanText.includes("đèn")) || 
                                 (matchesWords(cleanText, ["đèn ngủ", "cozy", "lamp", "ngủ"]) && matchesWords(cleanText, ["đèn led", "led", "dải"]));

            // Check ambiguity first
            const isAmbiguous = !isAll && !isBothLights && cleanText.includes("đèn") && 
                                !matchesWords(cleanText, ["gaming", "led", "dải", "nền", "ngủ", "cozy", "lamp"]);
            if (isAmbiguous) {
              const responseText = "Bạn muốn hẹn giờ cho đèn LED gaming hay đèn ngủ?";
              setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
              speakResponse(responseText);
              return;
            }

            action = (cleanText.includes("tắt") || cleanText.includes("tát") || cleanText.includes("ngắt") || cleanText.includes("dừng")) ? 0 : 1;
            const actionText = action === 1 ? "bật" : "tắt";

            if (isAll) {
              // Rule 1 (LED: 10), Rule 2 (FAN: 11), Rule 4 (LAMP: 13)
              setRules(prev => prev.map((r, i) => {
                if (i === 0) return { ...r, hour: hr, minute: mn, pin: 10, action: action, active: true };
                if (i === 1) return { ...r, hour: hr, minute: mn, pin: 11, action: action, active: true };
                if (i === 3) return { ...r, hour: hr, minute: mn, pin: 13, action: action, active: true };
                return r;
              }));
              const responseText = `Dạ, tôi đã hẹn giờ tự động ${actionText} tất cả thiết bị vào lúc ${hr} giờ ${mn > 0 ? mn + ' phút' : 'đúng'}.`;
              setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
              speakResponse(responseText);
              
              executeSerialCommand(`CMD:RUL:1:${pad2(hr)}:${pad2(mn)}:10:${action}`);
              setTimeout(() => executeSerialCommand(`CMD:RUL:2:${pad2(hr)}:${pad2(mn)}:11:${action}`), 150);
              setTimeout(() => executeSerialCommand(`CMD:RUL:4:${pad2(hr)}:${pad2(mn)}:13:${action}`), 300);
              return;
            }

            if (isBothLights) {
              // Rule 1 (LED: 10), Rule 4 (LAMP: 13)
              setRules(prev => prev.map((r, i) => {
                if (i === 0) return { ...r, hour: hr, minute: mn, pin: 10, action: action, active: true };
                if (i === 3) return { ...r, hour: hr, minute: mn, pin: 13, action: action, active: true };
                return r;
              }));
              const responseText = `Dạ, tôi đã hẹn giờ tự động ${actionText} cả hai đèn vào lúc ${hr} giờ ${mn > 0 ? mn + ' phút' : 'đúng'}.`;
              setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
              speakResponse(responseText);
              
              executeSerialCommand(`CMD:RUL:1:${pad2(hr)}:${pad2(mn)}:10:${action}`);
              setTimeout(() => executeSerialCommand(`CMD:RUL:4:${pad2(hr)}:${pad2(mn)}:13:${action}`), 150);
              return;
            }

            const isAlarmRequest = cleanText.includes("hát") || cleanText.includes("nhạc") || cleanText.includes("rickroll") || cleanText.includes("chuông") || cleanText.includes("báo thức");
            const isLamp = cleanText.includes("đèn ngủ") || cleanText.includes("cozy") || cleanText.includes("lamp");
            const isLed = (cleanText.includes("đèn") || cleanText.includes("led")) && !cleanText.includes("đèn ngủ");
            const isFan = cleanText.includes("quạt") || cleanText.includes("fan");
            const isLock = cleanText.includes("cửa") || cleanText.includes("khóa") || cleanText.includes("khoá") || cleanText.includes("chốt");

            if (isLamp) {
              deviceId = "lamp";
              devicePin = 13;
              deviceLabel = "Đèn Ngủ Cozy";
            } else if (isLed) {
              deviceId = "led";
              devicePin = 10;
              deviceLabel = "Đèn LED Gaming";
            } else if (isFan) {
              deviceId = "fan";
              devicePin = 11;
              deviceLabel = "Quạt PC Turbo";
            } else if (isLock) {
              deviceId = "lock";
              devicePin = 12;
              deviceLabel = "Khóa Cửa Phòng";
            } else if (isAlarmRequest) {
              // Hẹn giờ báo thức nhạc
              setAlarmHour(hr);
              setAlarmMinute(mn);
              setAlarmEnabled(true);
              
              responseText = `Dạ, tôi đã hẹn giờ lên nhạc báo thức vào lúc ${hr} giờ ${mn > 0 ? mn + ' phút' : 'đúng'}.`;
              setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
              speakResponse(responseText);
              
              executeSerialCommand(`CMD:ALM:${pad2(hr)}:${pad2(mn)}`);
              return;
            }

            if (deviceId && action !== -1) {
              const rulePinAction = devicePin === 12 ? (cleanText.includes("mở") || cleanText.includes("bẻ") || cleanText.includes("ra") ? 0 : 1) : action;
              const ruleIdx = devicePin - 10; // Pin 10 -> slot 0, Pin 11 -> slot 1, etc.
              setRules(prev => prev.map((r, i) => i === ruleIdx ? { ...r, hour: hr, minute: mn, pin: devicePin, action: rulePinAction, active: true } : r));
              
              const specificActionText = rulePinAction === 1 ? (devicePin === 12 ? "khóa" : "bật") : (devicePin === 12 ? "mở khóa" : "tắt");
              responseText = `Dạ, tôi đã lên lịch tự động ${specificActionText} ${deviceLabel} vào lúc ${hr} giờ ${mn > 0 ? mn + ' phút' : 'đúng'}.`;
              
              setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
              speakResponse(responseText);
              
              executeSerialCommand(`CMD:RUL:${ruleIdx + 1}:${pad2(hr)}:${pad2(mn)}:${devicePin}:${rulePinAction}`);
              return;
            }
          }
        }

        // Điều khiển tức thì nếu không có từ khóa hẹn giờ
        const isTurnOn = matchesWords(cleanText, ["bật", "mở", "lên", "chạy", "sáng", "quay", "kích hoạt", "on"]);
        const isTurnOff = matchesWords(cleanText, ["tắt", "ngắt", "dừng", "tát", "im", "off"]);
        
        const hasAmbiguousLamp = cleanText.includes("đèn") && 
                                 !matchesWords(cleanText, ["gaming", "led", "dải", "nền", "ngủ", "cozy", "lamp"]);
        const hasLed = (matchesWords(cleanText, ["đèn", "led", "dải"]) && !matchesWords(cleanText, ["đèn ngủ", "cozy", "lamp"])) || cleanText === "led" || cleanText === "đèn";
        const hasFan = matchesWords(cleanText, ["quạt", "fan", "gió"]);
        const hasLock = matchesWords(cleanText, ["khóa", "khoá", "đóng", "chốt", "sập", "cửa", "lock", "latch", "cổng"]);
        const hasLamp = matchesWords(cleanText, ["đèn ngủ", "cozy", "lamp", "ngủ"]);
        const hasBuzzer = matchesWords(cleanText, ["hát", "nhạc", "rickroll", "âm nhạc", "còi", "chuông", "báo thức", "bzz"]);

        const isAll = matchesWords(cleanText, ["tất cả", "hết", "mọi thứ", "sạch", "all", "cả phòng"]);
        const hasBothLights = (cleanText.includes("cả hai") && cleanText.includes("đèn")) || 
                              (matchesWords(cleanText, ["đèn ngủ", "cozy", "lamp", "ngủ"]) && matchesWords(cleanText, ["đèn led", "led", "dải"]));

        // 0. Kiểm tra combo thiết bị trước
        if (isAll && isTurnOn) {
          executeSerialCommand("CMD:LED:1");
          executeSerialCommand("CMD:FAN:1");
          executeSerialCommand("CMD:LMP:1");
          responseText = "Dạ, tôi đã bật tất cả thiết bị: đèn led gaming, quạt tản nhiệt và đèn ngủ cozy.";
        } else if (isAll && isTurnOff) {
          executeSerialCommand("CMD:LED:0");
          executeSerialCommand("CMD:FAN:0");
          executeSerialCommand("CMD:LMP:0");
          executeSerialCommand("CMD:BZZ:0");
          responseText = "Dạ, tôi đã tắt tất cả thiết bị và dừng phát nhạc.";
        } else if (hasBothLights && isTurnOn) {
          executeSerialCommand("CMD:LED:1");
          executeSerialCommand("CMD:LMP:1");
          responseText = "Đã bật cả đèn led gaming và đèn ngủ cozy.";
        } else if (hasBothLights && isTurnOff) {
          executeSerialCommand("CMD:LED:0");
          executeSerialCommand("CMD:LMP:0");
          responseText = "Đã tắt cả đèn led gaming và đèn ngủ cozy.";
        }
        // 1. Kiểm tra nhập nhèm đèn (Ambiguity check)
        else if (hasAmbiguousLamp) {
          if (isTurnOn) {
            responseText = "Bạn muốn bật đèn LED gaming hay đèn ngủ?";
          } else if (isTurnOff) {
            responseText = "Bạn muốn tắt đèn LED gaming hay đèn ngủ?";
          } else {
            responseText = "Bạn muốn điều khiển đèn LED gaming hay đèn ngủ?";
          }
        }
        // 1. Đèn LED Gaming
        else if (hasLed && isTurnOn) {
          commandToSend = "CMD:LED:1";
          responseText = "Dạ, tôi đã bật dải đèn led gaming cho bạn.";
        } else if (hasLed && isTurnOff) {
          commandToSend = "CMD:LED:0";
          responseText = "Đã tắt đèn gaming.";
        } else if (hasLed && (cleanText.includes("màu đỏ") || cleanText.includes("đỏ"))) {
          commandToSend = "CMD:LED:R";
          responseText = "Đã chuyển dải đèn led sang màu đỏ.";
        } else if (hasLed && (cleanText.includes("xanh lá") || cleanText.includes("lục") || cleanText.includes("xanh lá cây"))) {
          commandToSend = "CMD:LED:G";
          responseText = "Đã chuyển đèn sang màu xanh lá cây.";
        } else if (hasLed && (cleanText.includes("xanh dương") || cleanText.includes("xanh lam") || cleanText.includes("xanh nước biển") || cleanText.includes("xanh dương"))) {
          commandToSend = "CMD:LED:B";
          responseText = "Đã chuyển đèn sang màu xanh dương.";
        } else if (hasLed && (cleanText.includes("màu tím") || cleanText.includes("tím"))) {
          commandToSend = "CMD:LED:P";
          responseText = "Đã chuyển đèn led sang màu tím mộng mơ.";
        } else if (hasLed && (cleanText.includes("vũ trường") || cleanText.includes("party") || cleanText.includes("nháy") || cleanText.includes("quẩy"))) {
          commandToSend = "CMD:LED:W";
          responseText = "Chế độ vũ trường đã kích hoạt! Quẩy thôi bạn ơi!";
        }
        // 2. Quạt tản nhiệt
        else if (hasFan && isTurnOn) {
          commandToSend = "CMD:FAN:1";
          responseText = "Đang kích hoạt quạt tản nhiệt PC.";
        } else if (hasFan && isTurnOff) {
          commandToSend = "CMD:FAN:0";
          responseText = "Đã tắt quạt tản nhiệt.";
        }
        // 3. Khóa cửa (Đóng/Mở)
        else if (hasLock && (cleanText.includes("mở") || cleanText.includes("ra") || cleanText.includes("bẻ"))) {
          commandToSend = "CMD:LCK:0";
          responseText = "Đã mở khóa cửa phòng ngủ.";
        } else if (hasLock && (cleanText.includes("khóa") || cleanText.includes("khoá") || cleanText.includes("đóng") || cleanText.includes("chốt") || cleanText.includes("sập") || cleanText.includes("lại"))) {
          commandToSend = "CMD:LCK:1";
          responseText = "Đã khóa cửa phòng ngủ. Chúc bạn có không gian riêng tư bảo mật.";
        }
        // 4. Đèn ngủ Cozy
        else if (hasLamp && isTurnOn) {
          commandToSend = "CMD:LMP:1";
          responseText = "Đèn ngủ ấm cúng đã được bật.";
        } else if (hasLamp && isTurnOff) {
          commandToSend = "CMD:LMP:0";
          responseText = "Đã tắt đèn ngủ.";
        }
        // 5. Còi phát nhạc Rickroll
        else if (hasBuzzer && isTurnOn) {
          commandToSend = "CMD:BZZ:R";
          responseText = "Vâng, mời bạn thưởng thức giai điệu bài hát Rickroll huyền thoại!";
        } else if (hasBuzzer && isTurnOff) {
          commandToSend = "CMD:BZZ:0";
          responseText = "Đã tắt âm nhạc.";
        } else {
          responseText = "Tôi nghe không rõ, bạn có thể nói lại được không? Ví dụ: bật đèn gaming, đổi đèn màu đỏ, hoặc chạy quạt turbo!";
        }

        setChatHistory(prev => [...prev, { sender: 'bot', text: responseText }]);
        speakResponse(responseText);
        if (commandToSend) {
          executeSerialCommand(commandToSend);
        }

        const isDefaultResponse = responseText.includes("Tôi nghe không rõ");
        const isAmbiguityResponse = responseText.includes("Bạn muốn bật đèn LED gaming hay đèn ngủ?") || 
                                    responseText.includes("Bạn muốn tắt đèn LED gaming hay đèn ngủ?") || 
                                    responseText.includes("Bạn muốn điều khiển đèn LED gaming hay đèn ngủ?") || 
                                    responseText.includes("Bạn muốn hẹn giờ cho đèn LED gaming hay đèn ngủ?");
                                    
        const commandMatched = !isDefaultResponse && !isAmbiguityResponse;
        
        if (commandMatched) {
          addLog('[VOICE] Command matched. Stopping microphone...');
          try {
            isListeningRef.current = false;
            setIsListening(false);
            recognitionRef.current?.abort();
          } catch (e) {
            console.error(e);
          }
        }
      };

      handleVoiceCommandRef.current = handleVoiceCommand;

      // Simulated voice recording trigger
      const toggleVoiceListening = () => {
        if (!recognitionRef.current) {
          // Fallback simulator text input if speech recognition not supported
          const textPrompt = prompt("Nhập khẩu lệnh tiếng Việt của bạn (giả lập mic):");
          if (textPrompt) {
            handleVoiceCommandRef.current?.(textPrompt);
          }
          return;
        }

        if (isListening) {
          isFirstStartRef.current = true;
          try {
            recognitionRef.current.abort(); // Dừng ngay lập tức!
          } catch (e) {
            console.error(e);
          }
          setIsListening(false);
          setInterimTranscript('');
          setChatHistory(prev => [...prev, { sender: 'voice-status', text: 'Đã dừng nghe giọng nói.' }]);
        } else {
          isFirstStartRef.current = true;
          try {
            recognitionRef.current.abort(); // Abort any lingering session defensively
          } catch (e) {}
          
          setTimeout(() => {
            try {
              recognitionRef.current.start();
            } catch (e) {
              console.error(e);
            }
          }, 100);
        }
      };

      // Process Serial commands
      const executeSerialCommand = (cmd) => {
        addLog(`[SERIAL IN] ${cmd}`);
        setChatHistory(prev => [...prev, { sender: 'serial-in', text: `➔ Gửi Serial: ${cmd}` }]);
        
        if (cmd.startsWith("CMD:")) {
          const sub = cmd.substring(4);
          const parts = sub.split(':');
          if (parts.length === 2) {
            const device = parts[0]; 
            const val = parts[1];    
            
            let ack = "";
            
            if (device === "LED") {
              setDevices(prev => prev.map(d => {
                if (d.id === 'led') {
                  const state = (val !== "0");
                  let activeColor = d.activeColor;
                  let ledMode = 'solid';
                  if (val === 'R') activeColor = 'red';
                  else if (val === 'G') activeColor = 'green';
                  else if (val === 'B') activeColor = 'blue';
                  else if (val === 'P') activeColor = 'purple';
                  else if (val === 'W') { activeColor = 'rainbow'; ledMode = 'rainbow'; }
                  else if (val === '1') activeColor = 'purple';
                  
                  return { ...d, state, activeColor, ledMode };
                }
                return d;
              }));
              ack = `ACK:LED:${val}`;
            }
            else if (device === "FAN") {
              setDevices(prev => prev.map(d => {
                if (d.id === 'fan') return { ...d, state: (val === "1") };
                return d;
              }));
              ack = `ACK:FAN:${val}`;
            }
            else if (device === "LCK") {
              setDevices(prev => prev.map(d => {
                if (d.id === 'lock') return { ...d, state: (val === "1") };
                return d;
              }));
              ack = `ACK:LCK:${val}`;
            }
            else if (device === "LMP") {
              setDevices(prev => prev.map(d => {
                if (d.id === 'lamp') return { ...d, state: (val === "1") };
                return d;
              }));
              ack = `ACK:LMP:${val}`;
            }
            else if (device === "BZZ") {
              if (val === "R") {
                startRickrollMusic();
                ack = "ACK:BZZ:R";
              } else if (val === "0") {
                stopRickrollMusic();
                ack = "ACK:BZZ:0";
              }
            }
            
            if (ack) {
              setTimeout(() => {
                addLog(`[SERIAL OUT] ${ack}`);
                setChatHistory(prev => [...prev, { sender: 'serial-out', text: `⬅ Nhận Serial: ${ack}` }]);
              }, 150);
            }
          }
        }
      };

      // Rickroll Web Audio Player
      const startRickrollMusic = () => {
        stopRickrollMusic();
        setRickrollPlaying(true);
        rickrollNoteIndexRef.current = 0;
        addLog("[BUZZER] 🎵 Playing: Never Gonna Give You Up...");
        
        try {
          if (!audioCtxRef.current) {
            audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioCtxRef.current;
          if (ctx.state === 'suspended') ctx.resume();
          
          const melody = [
            { note: 440, dur: 140, lyric: "Ne-" }, // A4
            { note: 494, dur: 140, lyric: "ver" }, // B4
            { note: 587, dur: 140, lyric: " gon-" }, // D5
            { note: 494, dur: 140, lyric: "na" }, // B4
            { note: 740, dur: 280, lyric: " give" }, // F#5
            { note: 740, dur: 280, lyric: " you" }, // F#5
            { note: 659, dur: 560, lyric: " up!" }, // E5
            { note: 0, dur: 280, lyric: "" }, // pause
            { note: 440, dur: 140, lyric: "Ne-" }, // A4
            { note: 494, dur: 140, lyric: "ver" }, // B4
            { note: 587, dur: 140, lyric: " gon-" }, // D5
            { note: 494, dur: 140, lyric: "na" }, // B4
            { note: 659, dur: 280, lyric: " let" }, // E5
            { note: 659, dur: 280, lyric: " you" }, // E5
            { note: 587, dur: 140, lyric: " down!" }, // D5
            { note: 554, dur: 140, lyric: "" }, 
            { note: 494, dur: 560, lyric: "" }, 
            { note: 0, dur: 280, lyric: "" }, 
            { note: 440, dur: 140, lyric: "Ne-" }, // A4
            { note: 494, dur: 140, lyric: "ver" }, // B4
            { note: 587, dur: 140, lyric: " gon-" }, // D5
            { note: 494, dur: 140, lyric: "na" }, // B4
            { note: 587, dur: 280, lyric: " run" }, // D5
            { note: 659, dur: 140, lyric: " a-" }, // E5
            { note: 554, dur: 140, lyric: "round" }, // C#5
            { note: 494, dur: 140, lyric: " and" }, // B4
            { note: 440, dur: 280, lyric: " de-" }, // A4
            { note: 440, dur: 280, lyric: "sert" }, // A4
            { note: 659, dur: 280, lyric: " you!" }, // E5
            { note: 587, dur: 560, lyric: "" }  // D5
          ];
          
          const playNextNote = () => {
            if (rickrollNoteIndexRef.current >= melody.length) {
              stopRickrollMusic();
              addLog("[BUZZER] Rickroll playback finished.");
              return;
            }
            
            const current = melody[rickrollNoteIndexRef.current];
            if (current.note > 0) {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sine';
              osc.frequency.setValueAtTime(current.note, ctx.currentTime);
              gain.gain.setValueAtTime(0.04, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (current.dur / 1000) * 0.95);
              osc.start();
              osc.stop(ctx.currentTime + current.dur / 1000);
            }
            
            if (current.lyric) {
              setRickrollLyric(prev => (current.lyric.startsWith("Ne-") ? current.lyric : prev + current.lyric));
            }
            
            rickrollNoteIndexRef.current += 1;
            rickrollIntervalRef.current = setTimeout(playNextNote, current.dur);
          };
          
          playNextNote();
        } catch (e) {
          console.error(e);
        }
      };

      const stopRickrollMusic = () => {
        setRickrollPlaying(false);
        setRickrollLyric("");
        if (rickrollIntervalRef.current) {
          clearTimeout(rickrollIntervalRef.current);
          rickrollIntervalRef.current = null;
        }
      };

      // Play buzzer click
      const playClickSound = () => {
        try {
          if (!audioCtxRef.current) {
            audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioCtxRef.current;
          if (ctx.state === 'suspended') ctx.resume();

          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = 'sine';
          osc.frequency.setValueAtTime(1000, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.05);

          gain.gain.setValueAtTime(0.03, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);

          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } catch (e) {
          console.error(e);
        }
      };

      // Alarm ring audio loop
      useEffect(() => {
        if (alarmRinging) {
          try {
            if (!audioCtxRef.current) {
              audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioCtxRef.current;

            const playBeep = () => {
              if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'square';
              osc.frequency.setValueAtTime(2500, ctx.currentTime);
              gain.gain.setValueAtTime(0.04, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
              osc.start();
              osc.stop(ctx.currentTime + 0.17);
            };

            playBeep();
            alarmIntervalRef.current = setInterval(playBeep, 500);
          } catch (e) {
            console.error(e);
          }
        } else {
          if (alarmIntervalRef.current) {
            clearInterval(alarmIntervalRef.current);
            alarmIntervalRef.current = null;
          }
        }
        return () => {
          if (alarmIntervalRef.current) clearInterval(alarmIntervalRef.current);
        };
      }, [alarmRinging]);

      // Button press router
      const handlePressButton = (btnName) => {
        playClickSound();

        if (alarmRinging) {
          setAlarmRinging(false);
          addLog("Alarm silenced by hardware button.");
          return;
        }

        if (rickrollPlaying) {
          stopRickrollMusic();
          addLog("Rickroll music silenced by hardware button.");
          return;
        }

        if (btnName === 'MODE') {
          handleModePress();
        } else if (btnName === 'UP') {
          handleUpPress();
        } else if (btnName === 'DOWN') {
          handleDownPress();
        }
      };

      const handleModePress = () => {
        switch (currentMode) {
          case MODES.DISPLAY:
            setCurrentMode(MODES.SET_HOUR);
            setTempHour(rtcTime.getHours());
            setTempMinute(rtcTime.getMinutes());
            addLog('Mode: SET TIME -> Setting Hour');
            break;
          case MODES.SET_HOUR:
            setCurrentMode(MODES.SET_MINUTE);
            addLog('Mode: SET TIME -> Setting Minute');
            break;
          case MODES.SET_MINUTE:
            const targetTime = new Date(rtcTime);
            targetTime.setHours(tempHour);
            targetTime.setMinutes(tempMinute);
            targetTime.setSeconds(0);
            
            const diff = targetTime.getTime() - Date.now();
            setTimeOffset(diff);
            
            setCurrentMode(MODES.SET_ALARM_HOUR);
            addLog(`RTC Adjusted: ${String(tempHour).padStart(2, '0')}:${String(tempMinute).padStart(2, '0')}`);
            addLog('Mode: SET ALARM -> Setting Hour');
            break;
          case MODES.SET_ALARM_HOUR:
            setCurrentMode(MODES.SET_ALARM_MINUTE);
            addLog('Mode: SET ALARM -> Setting Minute');
            break;
          case MODES.SET_ALARM_MINUTE:
            setAlarmEnabled(true);
            setCurrentMode(MODES.RULE_SELECT);
            setTempRuleIdx(0);
            addLog(`Alarm Set: ${pad2(alarmHour)}:${pad2(alarmMinute)} ON`);
            addLog('Mode: RULE SETUP -> Select Rule Slot');
            break;
          case MODES.RULE_SELECT:
            setCurrentMode(MODES.RULE_HOUR);
            addLog(`Rule R${tempRuleIdx + 1} Selected -> Setting Hour`);
            break;
          case MODES.RULE_HOUR:
            setCurrentMode(MODES.RULE_MIN);
            addLog(`Rule R${tempRuleIdx + 1} -> Setting Minute`);
            break;
          case MODES.RULE_MIN:
            setCurrentMode(MODES.RULE_DEV);
            addLog(`Rule R${tempRuleIdx + 1} -> Setting Target Device Pin`);
            break;
          case MODES.RULE_DEV:
            setCurrentMode(MODES.RULE_ACT);
            addLog(`Rule R${tempRuleIdx + 1} -> Setting Action`);
            break;
          case MODES.RULE_ACT:
            setCurrentMode(MODES.DISPLAY);
            addLog(`[EEPROM] Rule R${tempRuleIdx + 1} saved and activated.`);
            addLog('Mode: DISPLAY (Normal)');
            break;
        }
      };

      const handleUpPress = () => {
        switch (currentMode) {
          case MODES.DISPLAY:
            setAlarmEnabled(prev => {
              const next = !prev;
              addLog(`Alarm toggled: ${next ? 'ON' : 'OFF'}`);
              return next;
            });
            break;
          case MODES.SET_HOUR:
            setTempHour(prev => (prev + 1) % 24);
            break;
          case MODES.SET_MINUTE:
            setTempMinute(prev => (prev + 1) % 60);
            break;
          case MODES.SET_ALARM_HOUR:
            setAlarmHour(prev => (prev + 1) % 24);
            break;
          case MODES.SET_ALARM_MINUTE:
            setAlarmMinute(prev => (prev + 1) % 60);
            break;
          case MODES.RULE_SELECT:
            setTempRuleIdx(prev => (prev + 1) % 4);
            break;
          case MODES.RULE_HOUR:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, hour: (r.hour + 1) % 24 } : r));
            break;
          case MODES.RULE_MIN:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, minute: (r.minute + 1) % 60 } : r));
            break;
          case MODES.RULE_DEV:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, pin: (r.pin === 10 ? 11 : r.pin === 11 ? 12 : r.pin === 12 ? 13 : 10) } : r));
            break;
          case MODES.RULE_ACT:
            // 1 -> 0 -> 2
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, action: r.action === 1 ? 0 : r.action === 0 ? 2 : 1, active: (r.action !== 0) } : r));
            break;
        }
      };

      const handleDownPress = () => {
        switch (currentMode) {
          case MODES.DISPLAY:
            setAlarmEnabled(prev => {
              const next = !prev;
              addLog(`Alarm toggled: ${next ? 'ON' : 'OFF'}`);
              return next;
            });
            break;
          case MODES.SET_HOUR:
            setTempHour(prev => (prev - 1 + 24) % 24);
            break;
          case MODES.SET_MINUTE:
            setTempMinute(prev => (prev - 1 + 60) % 60);
            break;
          case MODES.SET_ALARM_HOUR:
            setAlarmHour(prev => (prev - 1 + 24) % 24);
            break;
          case MODES.SET_ALARM_MINUTE:
            setAlarmMinute(prev => (prev - 1 + 60) % 60);
            break;
          case MODES.RULE_SELECT:
            setTempRuleIdx(prev => (prev - 1 + 4) % 4);
            break;
          case MODES.RULE_HOUR:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, hour: (r.hour - 1 + 24) % 24 } : r));
            break;
          case MODES.RULE_MIN:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, minute: (r.minute - 1 + 60) % 60 } : r));
            break;
          case MODES.RULE_DEV:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, pin: (r.pin === 10 ? 13 : r.pin === 11 ? 10 : r.pin === 12 ? 11 : 12) } : r));
            break;
          case MODES.RULE_ACT:
            setRules(prev => prev.map((r, i) => i === tempRuleIdx ? { ...r, action: r.action === 1 ? 2 : r.action === 0 ? 1 : 0, active: (r.action !== 2) } : r));
            break;
        }
      };

      // Compile next schedule task string for LCD line 2
      const getNextTaskString = () => {
        const activeRules = rules.filter(r => r.active && r.action !== 2);
        if (activeRules.length === 0) return "NEXT: NONE";
        
        const nowMinutes = rtcTime.getHours() * 60 + rtcTime.getMinutes();
        const ruleDiffs = activeRules.map(r => {
          const ruleMinutes = r.hour * 60 + r.minute;
          let diff = ruleMinutes - nowMinutes;
          if (diff <= 0) diff += 24 * 60; // triggers tomorrow
          return { ...r, diff };
        });

        ruleDiffs.sort((a, b) => a.diff - b.diff);
        const next = ruleDiffs[0];
        
        const devAbbr = next.pin === 10 ? 'D' : next.pin === 11 ? 'Q' : next.pin === 12 ? 'K' : 'N';
        const actStr = next.action === 1 ? 'ON' : 'OFF';
        return `> ${devAbbr} ${actStr}: ${pad2(next.hour)}:${pad2(next.minute)}`;
      };

      const pad2 = (num) => String(num).padStart(2, '0');

      const getDevAbbr = (pin) => {
        if (pin === 10) return 'D';
        if (pin === 11) return 'Q';
        if (pin === 12) return 'K';
        if (pin === 13) return 'N';
        return 'D' + pin;
      };

      // LCD display formatter
      const getLCDText = () => {
        let line1 = "";
        let line2 = "";
        let activeRanges1 = [];
        let activeRanges2 = [];

        if (rickrollPlaying) {
          line1 = "🎵 RICKROLL PLAY ";
          line2 = rickrollLyric.padEnd(16, ' ').substring(0, 16);
          return { line1, line2, activeRanges1, activeRanges2 };
        }

        switch (currentMode) {
          case MODES.DISPLAY:
            line1 = `TIME: ${pad2(rtcTime.getHours())}:${pad2(rtcTime.getMinutes())}:${pad2(rtcTime.getSeconds())}`;
            if (alternateState === 'DATE') {
              line2 = `DATE: ${pad2(rtcTime.getDate())}/${pad2(rtcTime.getMonth() + 1)}/${rtcTime.getFullYear()}`;
            } else if (alternateState === 'RELAYS') {
              const d = devices[0].state ? 'B' : 'T';
              const q = devices[1].state ? 'B' : 'T';
              const k = devices[2].state ? 'K' : 'M';
              const n = devices[3].state ? 'B' : 'T';
              line2 = `D:${d} Q:${q} K:${k} N:${n}`;
            } else {
              line2 = getNextTaskString();
            }
            break;
            
          case MODES.SET_HOUR:
            line1 = `TIME: ${pad2(tempHour)}:${pad2(tempMinute)}:00`;
            line2 = "[SETTING HOUR]  ";
            activeRanges1 = [{ start: 6, end: 7 }];
            break;
            
          case MODES.SET_MINUTE:
            line1 = `TIME: ${pad2(tempHour)}:${pad2(tempMinute)}:00`;
            line2 = "[SETTING MINUTE]";
            activeRanges1 = [{ start: 9, end: 10 }];
            break;
            
          case MODES.SET_ALARM_HOUR:
            line1 = "SET ALARM TIME  ";
            line2 = `ALARM:${pad2(alarmHour)}:${pad2(alarmMinute)}  ON`;
            activeRanges2 = [{ start: 6, end: 7 }];
            break;
            
          case MODES.SET_ALARM_MINUTE:
            line1 = "SET ALARM TIME  ";
            line2 = `ALARM:${pad2(alarmHour)}:${pad2(alarmMinute)}  ON`;
            activeRanges2 = [{ start: 9, end: 10 }];
            break;

          case MODES.RULE_SELECT:
            line1 = `SETUP RULE R${tempRuleIdx + 1}:  `;
            line2 = `Select Rule: R${tempRuleIdx + 1}`;
            activeRanges2 = [{ start: 13, end: 14 }];
            break;

          case MODES.RULE_HOUR:
            const rH = rules[tempRuleIdx];
            line1 = `SETUP R${tempRuleIdx + 1}: HOUR `;
            line2 = `T:${pad2(rH.hour)}:${pad2(rH.minute)} ${getDevAbbr(rH.pin)} ${rH.action === 1 ? 'ON ' : rH.action === 0 ? 'OFF' : 'DIS'}`;
            activeRanges2 = [{ start: 2, end: 3 }];
            break;

          case MODES.RULE_MIN:
            const rM = rules[tempRuleIdx];
            line1 = `SETUP R${tempRuleIdx + 1}: MIN  `;
            line2 = `T:${pad2(rM.hour)}:${pad2(rM.minute)} ${getDevAbbr(rM.pin)} ${rM.action === 1 ? 'ON ' : rM.action === 0 ? 'OFF' : 'DIS'}`;
            activeRanges2 = [{ start: 5, end: 6 }];
            break;

          case MODES.RULE_DEV:
            const rD = rules[tempRuleIdx];
            line1 = `SETUP R${tempRuleIdx + 1}: DEV  `;
            line2 = `T:${pad2(rD.hour)}:${pad2(rD.minute)} ${getDevAbbr(rD.pin)} ${rAString(rD.action)}`;
            activeRanges2 = [{ start: 8, end: 8 }];
            break;

          case MODES.RULE_ACT:
            const rA = rules[tempRuleIdx];
            line1 = `SETUP R${tempRuleIdx + 1}: ACT  `;
            line2 = `T:${pad2(rA.hour)}:${pad2(rA.minute)} ${getDevAbbr(rA.pin)} ${rAString(rA.action)}`;
            activeRanges2 = [{ start: 10, end: 12 }];
            break;
        }

        return { line1, line2, activeRanges1, activeRanges2 };
      };

      const rAString = (action) => {
        if (action === 1) return 'ON ';
        if (action === 0) return 'OFF';
        return 'DIS';
      };

      const { line1, line2, activeRanges1, activeRanges2 } = getLCDText();

      // Individual character block renderer
      const renderLCDRow = (text, activeRanges) => {
        const chars = text.padEnd(16, ' ').substring(0, 16).split('');
        return (
          <div className="flex justify-between select-none">
            {chars.map((char, charIndex) => {
              const isActive = activeRanges.some(range => charIndex >= range.start && charIndex <= range.end);
              let charClass = "relative w-[1ch] inline-block text-center transition-all duration-100";
              if (isActive) {
                charClass += " text-violet-400 dark:text-violet-300 font-bold border-b-2 border-violet-400 dark:border-violet-300 animate-pulse";
              }
              return (
                <span key={charIndex} className={charClass}>
                  <span className="absolute inset-0 opacity-[0.03] dark:opacity-[0.08] text-zinc-950 dark:text-white pointer-events-none">
                    █
                  </span>
                  <span className="relative z-10">{char}</span>
                </span>
              );
            })}
          </div>
        );
      };

      const getLCDScreenClass = () => {
        if (!lcdBacklight) return 'bg-zinc-900 border-zinc-950 text-zinc-800'; 
        if (alarmRinging && blinkState) return 'bg-red-600 border-red-800 text-red-100'; 
        
        switch (lcdColor) {
          case 'green':
            return 'bg-emerald-950/25 border-emerald-900/50 text-emerald-400 lcd-text-shadow-green';
          case 'yellow':
            return 'bg-yellow-300 border-yellow-500 text-zinc-900 lcd-text-shadow-yellow';
          case 'blue':
          default:
            return 'bg-violet-950/30 border-violet-900/40 text-violet-200 lcd-text-shadow-blue';
        }
      };

      // Add rule manual form submission
      const handleAddRule = (e) => {
        e.preventDefault();
        const hr = parseInt(e.target.hr.value);
        const mn = parseInt(e.target.mn.value);
        const pin = parseInt(e.target.pin.value);
        const action = parseInt(e.target.action.value);
        
        const newRule = {
          id: rules.length + 1,
          hour: hr,
          minute: mn,
          pin: pin,
          action: action,
          active: (action !== 2)
        };
        setRules(prev => [...prev, newRule].sort((a,b) => (a.hour*60+a.minute) - (b.hour*60+b.minute)));
        addLog(`[EEPROM] Saved Rule: Pin D${pin} -> ${rAString(action)} at ${pad2(hr)}:${pad2(mn)}`);
      };

      // Ambient glow style generator
      const getAmbientGlowStyle = () => {
        const ledDev = devices.find(d => d.id === 'led');
        if (!ledDev || !ledDev.state) return {};
        
        if (ledDev.ledMode === 'rainbow') {
          return {
            boxShadow: '0 0 100px rgba(139, 92, 246, 0.35)',
            border: '2px solid rgba(139, 92, 246, 0.4)',
            animation: 'rainbow-glow 4s linear infinite'
          };
        }
        
        let colorRgba = 'rgba(139, 92, 246, 0.35)'; // Purple default
        let borderRgba = 'rgba(139, 92, 246, 0.4)';
        if (ledDev.activeColor === 'red') {
          colorRgba = 'rgba(239, 68, 68, 0.35)';
          borderRgba = 'rgba(239, 68, 68, 0.4)';
        } else if (ledDev.activeColor === 'green') {
          colorRgba = 'rgba(34, 197, 94, 0.35)';
          borderRgba = 'rgba(34, 197, 94, 0.4)';
        } else if (ledDev.activeColor === 'blue') {
          colorRgba = 'rgba(59, 130, 246, 0.35)';
          borderRgba = 'rgba(59, 130, 246, 0.4)';
        }
        
        return {
          boxShadow: `0 0 100px ${colorRgba}`,
          border: `2px solid ${borderRgba}`
        };
      };

      // Toggle rule active status
      const handleToggleRule = (id) => {
        setRules(prev => prev.map(r => r.id === id ? { ...r, active: !r.active } : r));
      };

      // Delete scheduler rule
      const handleDeleteRule = (id) => {
        setRules(prev => prev.filter(r => r.id !== id));
        addLog(`[EEPROM] Deleted Rule ID: ${id}`);
      };

      // Manual toggle device override
      const handleManualOverride = (id) => {
        playClickSound();
        setDevices(prev => prev.map(dev => {
          if (dev.id === id) {
            const nextState = !dev.state;
            addLog(`[RELAY] D${dev.pin.substring(1)} override: -> ${nextState ? 'ON' : 'OFF'}`);
            return { ...dev, state: nextState };
          }
          return dev;
        }));
      };

      // Interactive wiring schematic mouse events
      const handleSchematicClick = (infoText) => {
        playClickSound();
        setWireInfo(infoText);
      };

      return (
        <div className="space-y-6">
          
          {/* Header Panel */}
          <div className="flex flex-col sm:flex-row justify-between items-center bg-zinc-950/5 dark:bg-zinc-900/30 border border-zinc-200 dark:border-zinc-800 p-4 rounded-xl gap-4">
            <div className="flex items-center gap-3">
              <div className="p-2.5 bg-violet-600 rounded-lg text-white">
                <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
              </div>
              <div className="text-left">
                <h1 className="text-xl font-bold tracking-tight">Voice AI Gaming Room Hub</h1>
                <p className="text-xs text-zinc-500 dark:text-zinc-400 font-mono">Arduino Uno + DS3231 + Voice Commands (Comport 9600)</p>
              </div>
            </div>
            
            {/* Tabs & Controls */}
            <div className="flex flex-wrap items-center gap-2">
              <div className="flex bg-zinc-205 dark:bg-zinc-900 p-1 rounded-lg border border-zinc-300 dark:border-zinc-850 gap-1 text-xs font-bold">
                <button 
                  onClick={() => setActiveTab('console')}
                  className={`px-3 py-1.5 rounded-md transition-all cursor-pointer ${
                    activeTab === 'console' 
                      ? 'bg-violet-600 text-white shadow' 
                      : 'text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300'
                  }`}
                >
                  Bảng Điều Khiển
                </button>
                <button 
                  onClick={() => setActiveTab('schematic')}
                  className={`px-3 py-1.5 rounded-md transition-all cursor-pointer ${
                    activeTab === 'schematic' 
                      ? 'bg-violet-600 text-white shadow' 
                      : 'text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300'
                  }`}
                >
                  Sơ Đồ Đấu Nối
                </button>
                <button 
                  onClick={() => setActiveTab('guide')}
                  className={`px-3 py-1.5 rounded-md transition-all cursor-pointer ${
                    activeTab === 'guide' 
                      ? 'bg-violet-600 text-white shadow' 
                      : 'text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300'
                  }`}
                >
                  Hướng Dẫn Code
                </button>
              </div>

              <div className="flex bg-zinc-200 dark:bg-zinc-900 p-1 rounded-lg border border-zinc-300 dark:border-zinc-850 gap-1">
                {['blue', 'green', 'yellow'].map((color) => (
                  <button
                    key={color}
                    onClick={() => setLcdColor(color)}
                    className={`px-2 py-1 text-[9px] uppercase font-bold rounded cursor-pointer ${
                      lcdColor === color 
                        ? 'bg-zinc-900 text-white dark:bg-zinc-100 dark:text-zinc-900 shadow'
                        : 'text-zinc-500 hover:text-zinc-805 dark:hover:text-zinc-200'
                    }`}
                  >
                    {color === 'blue' ? 'violet' : color}
                  </button>
                ))}
              </div>

              <button 
                onClick={() => setTheme(p => p === 'dark' ? 'light' : 'dark')}
                className="p-2 rounded-lg border border-zinc-300 dark:border-zinc-800 bg-white dark:bg-zinc-905 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all shadow-sm cursor-pointer"
              >
                {theme === 'dark' ? (
                  <svg className="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 110 8 4 4 0 010-8z" />
                  </svg>
                ) : (
                  <svg className="w-4 h-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                  </svg>
                )}
              </button>
            </div>
          </div>

          {/* TAB CONTENT: CONSOLE */}
          {activeTab === 'console' && (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
              
              {/* LEFT COLUMN: HARDWARE CONTROLLER BOX (5 cols) */}
              <div className="lg:col-span-5 flex flex-col items-center">
                <motion.div
                  style={getAmbientGlowStyle()}
                  animate={alarmRinging ? {
                    x: [0, -3, 3, -3, 3, -2, 2, 0],
                    y: [0, 1.5, -1.5, 1.5, -1.5, 1, -1, 0]
                  } : {}}
                  transition={{ duration: 0.2, repeat: Infinity }}
                  className="w-full bg-zinc-200 dark:bg-zinc-900 border-4 border-zinc-300 dark:border-zinc-800 shadow-2xl rounded-3xl p-5 relative overflow-hidden transition-all duration-300"
                >
                  {/* Metal details */}
                  <div className="absolute top-2.5 left-2.5 w-2.5 h-2.5 rounded-full bg-zinc-450 dark:bg-zinc-700 shadow-inner flex items-center justify-center">
                    <div className="w-[6px] h-[1px] bg-zinc-600 dark:bg-zinc-950 rotate-45" />
                  </div>
                  <div className="absolute top-2.5 right-2.5 w-2.5 h-2.5 rounded-full bg-zinc-450 dark:bg-zinc-700 shadow-inner flex items-center justify-center">
                    <div className="w-[6px] h-[1px] bg-zinc-600 dark:bg-zinc-950 -rotate-45" />
                  </div>
                  <div className="absolute bottom-2.5 left-2.5 w-2.5 h-2.5 rounded-full bg-zinc-450 dark:bg-zinc-700 shadow-inner flex items-center justify-center">
                    <div className="w-[6px] h-[1px] bg-zinc-600 dark:bg-zinc-950 -rotate-12" />
                  </div>
                  <div className="absolute bottom-2.5 right-2.5 w-2.5 h-2.5 rounded-full bg-zinc-450 dark:bg-zinc-700 shadow-inner flex items-center justify-center">
                    <div className="w-[6px] h-[1px] bg-zinc-600 dark:bg-zinc-950 rotate-12" />
                  </div>

                  <div className="flex justify-between items-center mb-4 px-1">
                    <span className="text-[9px] tracking-[0.25em] font-bold text-zinc-450 dark:text-zinc-550 font-mono">
                      ARDUINO SMART HUB R1
                    </span>
                    
                    <div className="flex gap-2">
                      <div className="flex flex-col items-center">
                        <div className="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_6px_rgba(34,197,94,0.6)]" />
                        <span className="text-[6.5px] text-zinc-400 dark:text-zinc-500 mt-0.5 font-mono">PWR</span>
                      </div>
                      <div className="flex flex-col items-center">
                        <motion.div 
                          animate={{ opacity: [1, 0.3, 1] }}
                          transition={{ duration: 1, repeat: Infinity }}
                          className="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_6px_rgba(59,130,246,0.6)]" 
                        />
                        <span className="text-[6.5px] text-zinc-400 dark:text-zinc-500 mt-0.5 font-mono">RTC</span>
                      </div>
                      <div className="flex flex-col items-center">
                        <div className={`w-1.5 h-1.5 rounded-full transition-all ${
                          alarmRinging ? 'bg-red-500 animate-pulse' : alarmEnabled ? 'bg-amber-500' : 'bg-zinc-400 dark:bg-zinc-800'
                        }`} />
                        <span className="text-[6.5px] text-zinc-400 dark:text-zinc-500 mt-0.5 font-mono">ALM</span>
                      </div>
                    </div>
                  </div>

                  {/* LCD Display Bezel */}
                  <div className="bg-zinc-950 border-[5px] border-zinc-400 dark:border-zinc-800 rounded-xl p-2.5 shadow-inner mb-5">
                    
                    {/* LCD Glass Screen */}
                    <div className={`rounded font-mono relative overflow-hidden transition-all duration-300 py-3.5 px-4 ${getLCDScreenClass()}`}>
                      <div className="absolute inset-0 lcd-screen-scanline pointer-events-none opacity-40" />
                      
                      {/* Row 1 */}
                      <div className="relative text-[20px] md:text-[23px] leading-none tracking-[0.05em]">
                        {renderLCDRow(line1, activeRanges1)}
                      </div>

                      {/* Row 2 */}
                      <div className="relative text-[20px] md:text-[23px] leading-none tracking-[0.05em] mt-2">
                        {renderLCDRow(line2, activeRanges2)}
                      </div>
                    </div>

                    <div className="flex justify-between items-center text-[7.5px] text-zinc-500 tracking-wider mt-1.5 px-0.5 font-mono">
                      <span>16x2 LCD DISPLAY (0x27)</span>
                      <span>{rickrollPlaying ? "BUZZER PLAYING RICKROLL" : "DS3231 RTC ACTIVE"}</span>
                    </div>
                  </div>

                  {/* Ký hiệu màn hình LCD (Legend) */}
                  <div className="w-full bg-zinc-300/40 dark:bg-zinc-950/30 border border-zinc-400/20 dark:border-zinc-800 rounded-xl p-3 mb-5 text-[10.5px] space-y-1.5 text-left font-mono">
                    <div className="font-bold text-zinc-500 dark:text-zinc-400 border-b border-zinc-400/10 pb-1 uppercase tracking-wider text-[9px]">
                      Ký hiệu trạng thái dòng 2 (LCD Status Guide)
                    </div>
                    <div className="grid grid-cols-2 gap-2 text-zinc-600 dark:text-zinc-400">

                <p className="text-[11px] text-zinc-400 leading-relaxed">
                  Để biến hệ thống phần cứng Arduino thật của bạn thành một "AI Agent" nghe được giọng nói tiếng Việt ngoài đời thật, bạn hãy chạy một script Python nhỏ trên máy tính. Script này sẽ lắng nghe mic máy tính, nhận diện qua Google Speech API và ghi tín hiệu điều khiển xuống cổng Serial của Arduino.

import serial
import time

PORT = 'COM3' 
BAUD = 9600

try:
    arduino = serial.Serial(PORT, BAUD, timeout=1)
    print(f"Đã kết nối thành công với Arduino trên cổng {PORT}")
    time.sleep(2)
except Exception as e:
    print(f"Lỗi kết nối cổng Serial: {e}")
    exit()

def send_command(cmd_str):
    full_cmd = f"{cmd_str}\\n"
    arduino.write(full_cmd.encode('utf-8'))
    print(f"➔ Đã gửi: {cmd_str}")
    time.sleep(0.15)
    if arduino.in_waiting > 0:
      ack = arduino.readline().decode('utf-8').strip()
      print(f"⬅ Nhận: {ack}")

r = sr.Recognizer()
mic = sr.Microphone()

print("\\nHệ thống đang lắng nghe...")
while True:
    with mic as source:
        r.adjust_for_ambient_noise(source, duration=0.4)
        print("🗣️ Nói tiếng Việt...")
        try:
            audio = r.listen(source, timeout=4, phrase_time_limit=4)
            text = r.recognize_google(audio, language="vi-VN")
            print(f"🎙️ Nhận diện: '{text}'")
            clean_text = text.lower()
            
            if "bật đèn" in clean_text:
                send_command("CMD:LED:1")
            elif "tắt đèn" in clean_text:
                send_command("CMD:LED:0")
            elif "màu đỏ" in clean_text:
                send_command("CMD:LED:R")
            elif "màu xanh" in clean_text:
                send_command("CMD:LED:G")
            elif "màu tím" in clean_text:
                send_command("CMD:LED:P")
            elif "quạt" in clean_text and "bật" in clean_text:
                send_command("CMD:FAN:1")
            elif "quạt" in clean_text and "tắt" in clean_text:
                send_command("CMD:FAN:0")
            elif "khóa cửa" in clean_text and "mở" in clean_text:
                send_command("CMD:LCK:0")
            elif "khóa cửa" in clean_text:
                send_command("CMD:LCK:1")
            elif "đèn ngủ" in clean_text and "bật" in clean_text:
                send_command("CMD:LMP:1")
            elif "đèn ngủ" in clean_text and "tắt" in clean_text:
                send_command("CMD:LMP:0")
            elif "hát" in clean_text:
                send_command("CMD:BZZ:R")
            elif "tắt nhạc" in clean_text or "im" in clean_text:
                send_command("CMD:BZZ:0")
        except:
            pass
`}</pre>
