  <script>
    window.process = { env: { NODE_ENV: 'production' } };
    window.failedScripts = [];
    window.handleScriptError = function(name, url) {
      window.failedScripts.push(name + ' (' + url + ')');
      showErrorAlert();
    };

    window.onerror = function(message, source, lineno, colno, error) {
      var errText = 'Runtime Error: ' + message + '\nSource: ' + source + '\nLine: ' + lineno + ', Col: ' + colno;
      console.error(errText);
      showErrorAlert(errText);
      return false;
    };

    function showErrorAlert(customMessage) {
      function show() {
        if (!document.body) {
          setTimeout(show, 50);
          return;
        }
        var errorDiv = document.getElementById('error-display');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'error-display';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '10px';
          errorDiv.style.left = '50%';
          errorDiv.style.transform = 'translateX(-50%)';
          errorDiv.style.width = '90%';
          errorDiv.style.maxWidth = '600px';
          errorDiv.style.background = '#fef2f2';
          errorDiv.style.color = '#991b1b';
          errorDiv.style.padding = '16px';
          errorDiv.style.borderRadius = '12px';
          errorDiv.style.border = '1px solid #fca5a5';
          errorDiv.style.boxShadow = '0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05)';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '12px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.innerHTML = '<h3 style="font-weight: bold; font-size: 14px; margin-bottom: 8px;">🚨 LỖI HỆ THỐNG / SYSTEM ERROR</h3>' +
                               '<p style="margin-bottom: 12px; color: #7f1d1d;">Giao diện không thể khởi chạy. Thông tin chi tiết:</p>' +
                               '<div id="error-details" style="background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #fee2e2; max-height: 200px; overflow-y: auto;"></div>' +
                               '<button onclick="window.location.reload(true)" style="margin-top: 12px; padding: 6px 12px; background: #991b1b; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Tải Lại Trang (Reload)</button>';
          document.body.appendChild(errorDiv);
        }
        
        var detailsDiv = document.getElementById('error-details');
        if (detailsDiv) {
          var html = '';
          if (window.failedScripts.length > 0) {
            html += '<strong>Không thể tải thư viện (CDN Blocked/Slow):</strong>\n' + window.failedScripts.join('\n') + '\n\n';
          }
          if (customMessage) {
            html += '<strong>Lỗi thực thi (JS Crash):</strong>\n' + customMessage;
          }
          detailsDiv.innerHTML = html.replace(/\n/g, '<br>');
        }
      }
      show();
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // Safety check for Framer Motion availability
    let motionObj = window.Motion;
    if (!motionObj || !motionObj.motion) {
      const createMockComponent = (Tag) => {
        return React.forwardRef(({ children, whileHover, whileTap, transition, animate, initial, exit, ...props }, ref) => (
          <Tag ref={ref} {...props}>{children}</Tag>
        ));
      };
      motionObj = {
        motion: {
          div: createMockComponent('div'),
          button: createMockComponent('button'),
          span: createMockComponent('span')
        },
        AnimatePresence: ({ children }) => <>{children}</>
      };
    }
    const { motion, AnimatePresence } = motionObj;

    // --- SVG Icon Components ---
    const IconUsb = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 2v10m0 0l-3-3m3 3l3-3M6 9h12v10a2 2 0 01-2 2H8a2 2 0 01-2-2V9z" />
      </svg>
    );

    const IconClock = ({ className = "w-5 h-5" }) => (

        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />

    );

    const IconTemp = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a3 3 0 01-3-3V5a3 3 0 116 0v5a3 3 0 01-3 3v6h0zM12 9a1 1 0 100-2 1 1 0 000 2z" />
      </svg>
    );

    const IconCpu = ({ className = "w-5 h-5" }) => (

        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M3 9h2m-2 6h2m14-6h2m-2 6h2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />

    const IconTerminal = ({ className = "w-5 h-5" }) => (

        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    const IconRefresh = ({ className = "w-4 h-4" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
    );

    const IconMic = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      </svg>
    );

    const IconSparkles = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
      </svg>
    );

    const IconShieldAlert = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    // --- Main Application Component ---
    function App() {
      // Connection & Hardware State
      const [connectionMode, setConnectionMode] = useState('simulated'); // 'simulated' | 'web_serial'
      const [isConnected, setIsConnected] = useState(false);
      const serialPortRef = useRef(null);
      const serialReaderRef = useRef(null);

      // Realtime Environmental & Sensor Data
      const [currentTime, setCurrentTime] = useState(new Date());
      const [temperature, setTemperature] = useState(28.2); // °C
      const [humidity, setHumidity] = useState(65.0); // %
      const [motionState, setMotionState] = useState(1); // 1: Present at desk, 0: Absent
      const [unit, setUnit] = useState('C'); // 'C' | 'F'
      const lastHardwareTimeRef = useRef(0);

      // --- STUDY METHODS / PRESETS (PROFESSIONAL & ACADEMIC) ---
      const FOCUS_METHODS = [
        { id: 'pomodoro', name: '🍅 Pomodoro Tiêu Chuẩn', focusMins: 25, breakMins: 5, title: 'Chu Kỳ Kỷ Luật 25/5', desc: '25 phút Tập trung + 5 phút Nghỉ. Tỷ lệ chuẩn mực giúp duy trì sự tập trung cao độ.', color: '#ef4444' },
        { id: 'short_burst', name: '⚡ Tập Trung Tác Vụ Ngắn', focusMins: 15, breakMins: 3, title: 'Phiên Tập Trung Ngắn 15/3', desc: '15 phút Tập trung + 3 phút Nghỉ. Tối ưu cho việc giải quyết các bài tập nhỏ hoặc xử lý nhanh.', color: '#10b981' },
        { id: 'animedoro', name: '📚 Học Tập Mở Rộng 45m', focusMins: 45, breakMins: 9, title: 'Chu Kỳ Học Tập Sâu 45/9', desc: '45 phút Tập trung + 9 phút Nghỉ. Cân bằng giữa làm việc khối lượng lớn và nghỉ ngơi hợp lý.', color: '#ec4899' },
        { id: 'rule_52_17', name: '🧪 Quy Tắc 52/17 Protocol', focusMins: 52, breakMins: 11, title: 'Tối Ưu Nhịp Sinh Học 52/11', desc: '52 phút Tập trung + 11 phút Nghỉ. Tỷ lệ vàng được nghiên cứu giúp tối đa hóa hiệu suất não bộ.', color: '#8b5cf6' },
        { id: 'deep_work', name: '🧘 Tập Trung Sâu (Deep Work)', focusMins: 90, breakMins: 18, title: 'Phiên Deep Work 90/18', desc: '90 phút Tập trung + 18 phút Nghỉ. Chuyên biệt cho các đề tài phức tạp, nghiên cứu chuyên sâu.', color: '#3b82f6' },
        { id: 'flowtime', name: '🌊 Chế Độ Dòng Chảy (Flow)', focusMins: 120, breakMins: 24, title: 'Phiên Liên Tục 120/24', desc: '120 phút Tập trung + 24 phút Nghỉ. Dành cho công việc cần tư duy dài hạn không ngắt quãng.', color: '#14b8a6' }
      ];

      // --- SMART MODES & STATE MACHINE ---
      // Modes: 'NORMAL' | 'STUDY' | 'SECURITY'
      // Study Phases: 'FOCUS' | 'READY_FOR_BREAK' | 'BREAK' | 'PAUSED_AFK'
      const [activeMode, setActiveMode] = useState('NORMAL');
      const [selectedMethodId, setSelectedMethodId] = useState('pomodoro');
      const [showStudyModal, setShowStudyModal] = useState(false); // Modal popup selection
      const [studyPhase, setStudyPhase] = useState('FOCUS'); // 'FOCUS' | 'READY_FOR_BREAK' | 'BREAK' | 'PAUSED_AFK'
      const [studyTimer, setStudyTimer] = useState(25 * 60); // Default 25 mins for Pomodoro
      const [breakTimer, setBreakTimer] = useState(5 * 60); // Default 5 mins for Pomodoro
      const [pomodoroCount, setPomodoroCount] = useState(0); // Completed pomodoros
      const [absenceSeconds, setAbsenceSeconds] = useState(0); // Counter for study mode absence
      const [alarmTriggered, setAlarmTriggered] = useState(false);

      // Current active method object
      const activeMethod = FOCUS_METHODS.find(m => m.id === selectedMethodId) || FOCUS_METHODS[0];

      // AI Voice Agent State
      const [isListening, setIsListening] = useState(false);
      const [aiThinking, setAiThinking] = useState(false);
      const [userVoiceInput, setUserVoiceInput] = useState('');
      const [aiResponseText, setAiResponseText] = useState('Xin chào! Tôi là Trợ Lý AI Giám Sát Học Tập & Môi Trường. Vui lòng chọn phương pháp học tập để kích hoạt hệ thống.');
      const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');

      // Historical Telemetry Data for Chart
      const [history, setHistory] = useState(() => {
        const initial = [];
        const now = Date.now();
        for (let i = 19; i >= 0; i--) {
          initial.push({
            time: new Date(now - i * 3000).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            temp: +(27.5 + Math.random() * 1.5).toFixed(1),
            humidity: +(62.0 + Math.random() * 4.0).toFixed(1)
          });
        }
        return initial;
      });

      // Terminal Logs
      const [logs, setLogs] = useState([
        { id: 1, type: 'sys', text: 'Hệ thống Smart AI Desk Companion đã sẵn sàng.', time: new Date().toLocaleTimeString() },
        { id: 2, type: 'info', text: 'Chế độ Học tập: Hỗ trợ chọn phương pháp (5p/1p, 25p/5p...) + Bấm hoặc Nói "Nghỉ" để nghỉ xả hơi.', time: new Date().toLocaleTimeString() }
      ]);
      const logContainerRef = useRef(null);

      // Display customization
      const [lcdColor, setLcdColor] = useState('cyan');
      const [activeTab, setActiveTab] = useState('overview');

      // Simulation Controls
      const [simTemp, setSimTemp] = useState(28.2);
      const [simMotion, setSimMotion] = useState(1);

      // Speech Recognition Ref
      const recognitionRef = useRef(null);

      // Voice TTS Function (Speak Vietnamese)
      const speakVietnamese = (text) => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'vi-VN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const viVoice = voices.find(v => v.lang.includes('vi') || v.lang.includes('VI'));
        if (viVoice) utterance.voice = viVoice;

        window.speechSynthesis.speak(utterance);
      };

      // --- SPEECH RECOGNITION SETUP ---
      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          const rec = new SpeechRecognition();
          rec.continuous = false;
          rec.interimResults = false;
          rec.lang = 'vi-VN';

          rec.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setUserVoiceInput(transcript);
            addLog('info', `Giọng nói nhận diện: "${transcript}"`);
            processAiAgentQuery(transcript);
          };

          rec.onerror = (e) => {
            console.error('Speech recognition error:', e);
            setIsListening(false);
            addLog('error', `Lỗi micro: ${e.error}`);
          };

          rec.onend = () => {
            setIsListening(false);
          };

          recognitionRef.current = rec;
        }
      }, [activeMode, studyPhase, selectedMethodId, temperature, humidity, motionState]);

      const toggleMic = () => {
        if (!recognitionRef.current) {
          alert('Trình duyệt chưa hỗ trợ Web Speech API cho Micro. Hãy thử Chrome hoặc Edge!');
          return;
        }
        if (isListening) {
          recognitionRef.current.stop();
          setIsListening(false);
        } else {
          try {
            setUserVoiceInput('');
            recognitionRef.current.start();
            setIsListening(true);
            addLog('info', '🎤 Đang lắng nghe giọng nói tiếng Việt...');
          } catch (e) {
            console.error(e);
          }
        }
      };

      // --- AI AGENT ENGINE (GEMINI FLASH / INTENT PARSER) ---
      const processAiAgentQuery = async (queryText) => {
        setAiThinking(true);
        const textLower = queryText.toLowerCase();

        // Check if user says "nghỉ" / "xả hơi" when ready or during study
        if (textLower.includes('nghỉ') || textLower.includes('giải lao') || textLower.includes('xả hơi')) {
          if (activeMode === 'STUDY') {
            startBreakPhase();
            setAiThinking(false);
            return;
          }
        }

        let modeAction = null;
        let methodChoiceId = null;

        if (textLower.includes('pomodoro') || textLower.includes('25 phút') || textLower.includes('tiêu chuẩn')) {
          modeAction = 'STUDY';
          methodChoiceId = 'pomodoro';
        } else if (textLower.includes('học') || textLower.includes('tập trung') || textLower.includes('study')) {
          modeAction = 'STUDY';
        } else if (textLower.includes('an ninh') || textLower.includes('chống trộm') || textLower.includes('đi vắng')) {
          modeAction = 'SECURITY';
        } else if (textLower.includes('bình thường') || textLower.includes('normal')) {
          modeAction = 'NORMAL';
        }

        if (modeAction) {
          switchMode(modeAction, methodChoiceId);
        }

        if (geminiKey.trim()) {
          try {
            const systemContext = `Bạn là "Trợ Lý AI Smart Desk" nói tiếng Việt thân thiện, hóm hỉnh và hữu ích. 
Dữ liệu thời gian thực từ cảm biến:
- Thời gian: ${currentTime.toLocaleTimeString()}
- Nhiệt độ phòng: ${temperature}°C, Độ ẩm: ${humidity}%
- Trạng thái người dùng tại bàn: ${motionState === 1 ? 'Đang ngồi làm việc ở bàn' : 'Vắng mặt / Rời khỏi bàn'}
- Chế độ hiện tại: ${activeMode} (Phương pháp: ${activeMethod.name}, Pha: ${studyPhase})

Yêu cầu: Trả lời ngắn gọn dưới 3 câu, phong cách thân thiện, có cảm xúc.`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey.trim()}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: `${systemContext}\n\nNgười dùng vừa nói: "${queryText}"` }] }]
              })
            });
            const data = await res.json();
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (reply) {
              setAiResponseText(reply);
              speakVietnamese(reply);
              setAiThinking(false);
              return;
            }
          } catch (err) {
            console.error('Gemini API error:', err);
          }
        }

        // Fallback Rule Engine
        let reply = '';
        if (modeAction === 'STUDY') {
          reply = `Kích hoạt phương pháp ${activeMethod.name} (${activeMethod.focusMins} phút Tập trung + ${activeMethod.breakMins} phút Nghỉ). Chúc bạn làm việc hiệu quả.`;
        } else if (modeAction === 'SECURITY') {
          reply = `Đã kích hoạt Chế độ An Ninh Chống Trộm! Cảm biến PIR đang canh giữ không gian làm việc.`;
        } else if (modeAction === 'NORMAL') {
          reply = `Đã chuyển về Chế độ Bình Thường. Nhiệt độ phòng hiện tại là ${temperature}°C, độ ẩm ${humidity}%.`;
        } else if (textLower.includes('thời tiết') || textLower.includes('nhiệt độ') || textLower.includes('môi trường')) {
          reply = `Nhiệt độ phòng hiện tại là ${temperature}°C, độ ẩm ${humidity}%. ${temperature > 30 ? 'Thời tiết khá oi nóng, bạn nên bật điều hòa hoặc quạt mát.' : 'Thông số môi trường đang ở mức lý tưởng.'}`;
        } else {
          reply = `Hệ thống ghi nhận yêu cầu: "${queryText}". Thông số phòng hiện tại là ${temperature}°C, độ ẩm ${humidity}%.`;
        }

        setAiResponseText(reply);
        speakVietnamese(reply);
        setAiThinking(false);
      };

      // --- SWITCH SMART MODES & PRESETS HANDLER ---
      const switchMode = (mode, overrideMethodId = null) => {
        setActiveMode(mode);
        setAlarmTriggered(false);
        setAbsenceSeconds(0);

        if (mode === 'STUDY') {
          const mId = overrideMethodId || selectedMethodId;
          if (overrideMethodId) setSelectedMethodId(overrideMethodId);

          const methodObj = FOCUS_METHODS.find(m => m.id === mId) || FOCUS_METHODS[0];
          setStudyPhase('FOCUS');
          setStudyTimer(methodObj.focusMins * 60);
          setBreakTimer(methodObj.breakMins * 60);

          const startMsg = `Kích hoạt phương pháp ${methodObj.name}: ${methodObj.focusMins} phút Tập trung đầu tiên. Vui lòng tập trung làm việc.`;
          setAiResponseText(startMsg);
          speakVietnamese(startMsg);
          addLog('success', `📖 [Hệ Thống] Kích hoạt Pha Tập Trung ${methodObj.focusMins} phút (${methodObj.name}).`);
        } else if (mode === 'SECURITY') {
          addLog('error', '🛡️ Kích hoạt Chế độ AN NINH ĐI VẮNG (Cảnh báo PIR).');
        } else {
          addLog('info', '⏰ Chuyển về Chế độ BÌNH THƯỜNG.');
        }
      };

      // Manually or Verbally Trigger Break Phase
      const startBreakPhase = () => {
        if (activeMode !== 'STUDY') switchMode('STUDY');
        setStudyPhase('BREAK');
        setBreakTimer(activeMethod.breakMins * 60);
        const breakMsg = `Bắt đầu ${activeMethod.breakMins} phút Nghỉ Xả Hơi. Vui lòng thư giãn và vận động nhẹ nhàng.`;
        setAiResponseText(breakMsg);
        speakVietnamese(breakMsg);
        addLog('success', `☕ [Hệ Thống] Chuyển sang Pha Break ${activeMethod.breakMins} phút.`);
      };

      // --- AUTOMATED MYPODO POMODORO CYCLE TICKER (1s) ---
      useEffect(() => {
        const interval = setInterval(() => {
          // 1. Tick local time
          if (Date.now() - lastHardwareTimeRef.current > 2500) {
            setCurrentTime(prev => new Date(prev.getTime() + 1000));
          }

          // 2. Automated MyPodo Cycle
          if (activeMode === 'STUDY') {
            if (studyPhase === 'FOCUS') {
              // --- PHA 1: FOCUS / HỌC TẬP ---
              setStudyTimer(prev => {
                if (prev === 1) {
                  // Đủ thời gian học ➔ Chuyển sang trạng thái chờ/bắt đầu nghỉ
                  setStudyPhase('READY_FOR_BREAK');
                  setPomodoroCount(c => c + 1);
                  const completeMsg = `Chúc mừng bạn đã hoàn thành ${activeMethod.focusMins} phút tập trung. Bạn có thể nhấn nút hoặc nói 'Nghỉ' để bắt đầu ${activeMethod.breakMins} phút nghỉ ngơi.`;
                  setAiResponseText(completeMsg);
                  speakVietnamese(completeMsg);
                  addLog('success', `🎉 Hoàn thành ${activeMethod.focusMins}m Tập trung! Sẵn sàng nghỉ xả hơi ${activeMethod.breakMins}m.`);
                  return 0;
                }
                return prev > 0 ? prev - 1 : 0;
              });

              // XỬ LÝ EDGE CASE ĐI VẮNG THÔNG MINH (3 CẤP ĐỘ)
              if (motionState === 0) {
                setAbsenceSeconds(prev => {
                  const nextVal = prev + 1;

                  // Cấp độ 1: Rời bàn ngắn (15 giây) ➔ Nhắc nhẹ nhàng
                  if (nextVal === 15) {
                    const alertMsg = "Bro đi lấy nước hay đi đâu đấy? Nhớ quay lại bàn học sớm nhé!";
                    setAiResponseText(alertMsg);
                    speakVietnamese(alertMsg);
                    addLog('info', '💬 [AI Agent] Nhắc nhở rời bàn ngắn (15s).');
                  }
                  
                  // Cấp độ 2: Đi vắng vừa (3 phút / 180s) ➔ Tự động PAUSED_AFK (Đóng băng giờ học, không hét loa)
                  else if (nextVal === 180) {
                    setStudyPhase('PAUSED_AFK');
                    const pauseMsg = "Bro đã rời bàn hơn 3 phút. AI tự động tạm dừng đồng hồ học tập để chờ bro quay lại!";
                    setAiResponseText(pauseMsg);
                    speakVietnamese(pauseMsg);
                    addLog('error', '⏸️ [AI Agent] Tự động TẠM DỪNG (AFK > 3m). Đóng băng đếm ngược.');
                  }

                  return nextVal;
                });
              } else {
                setAbsenceSeconds(0);
              }

            } else if (studyPhase === 'PAUSED_AFK') {
              // --- CẤP ĐỘ 2: ĐANG TẠM DỪNG AFK ---
              setAbsenceSeconds(prev => {
                const nextVal = prev + 1;
                
                // Cấp độ 3: Đi vắng quá lâu (> 15 phút / 900s) ➔ Tự động Hủy phiên về NORMAL
                if (nextVal >= 900) {
                  switchMode('NORMAL');
                  const cancelMsg = "Bro đi vắng hơn 15 phút nên AI đã tự động đóng phiên học. Khi nào sẵn sàng thì bật lại nhé!";
                  setAiResponseText(cancelMsg);
                  speakVietnamese(cancelMsg);
                  addLog('error', '🛑 [AI Agent] Tự động HỦY phiên học do đi vắng quá 15 phút.');
                  return 0;
                }
                return nextVal;
              });

              // Khi người dùng QUAY LẠI BÀN (PIR motion == 1) ➔ Chào mừng trở lại & Tiếp tục học!
              if (motionState === 1) {
                setStudyPhase('FOCUS');
                const returnMsg = "Chào mừng bro đã quay lại bàn! Tự động tiếp tục đếm ngược bài học!";
                setAiResponseText(returnMsg);
                speakVietnamese(returnMsg);
                addLog('success', '▶️ [AI Agent] Phát hiện người dùng quay lại bàn! Tiếp tục FOCUS.');
                setAbsenceSeconds(0);
              }

            } else if (studyPhase === 'READY_FOR_BREAK') {
              setAbsenceSeconds(0);

            } else if (studyPhase === 'BREAK') {
              // --- PHA 2: BREAK / NGHỈ XẢ HƠI ---
              setBreakTimer(prev => {
                if (prev === 1) {
                  // Hết giờ nghỉ ➔ Tự động quay lại Pha 1: FOCUS
                  setStudyPhase('FOCUS');
                  setStudyTimer(activeMethod.focusMins * 60);
                  const nextFocusMsg = `Hết ${activeMethod.breakMins} phút nghỉ xả hơi! Tự động quay lại ${activeMethod.focusMins} phút Tập Trung tiếp theo!`;
                  setAiResponseText(nextFocusMsg);
                  speakVietnamese(nextFocusMsg);
                  addLog('success', `📖 [MyPodo] Hết Break! Tự động lặp lại ${activeMethod.focusMins}m Focus.`);
                  return 0;
                }
                return prev > 0 ? prev - 1 : 0;
              });

              setAbsenceSeconds(0);
            }
          }

          // 3. Security Mode supervision
          if (activeMode === 'SECURITY') {
            if (motionState === 1) {
              if (!alarmTriggered) {
                setAlarmTriggered(true);
                const secMsg = "Cảnh báo khẩn cấp! Phát hiện chuyển động lạ ở bàn làm việc!";
                setAiResponseText(secMsg);
                speakVietnamese(secMsg);
                addLog('error', '🚨 CẢNH BÁO CHỐNG TRỘM: Phát hiện kẻ lạ xâm nhập bàn làm việc!');
              }
            }
          }

        }, 1000);

        return () => clearInterval(interval);
      }, [activeMode, studyPhase, selectedMethodId, motionState, alarmTriggered]);

      // Instant Simulation Motion Handler
      const handleToggleSimMotion = (val) => {
        setSimMotion(val);
        setMotionState(val); // Instant update without waiting 2.5s interval
        addLog('info', val === 1 ? '🟢 Giả lập PIR: Người dùng CÓ MẶT tại bàn.' : '🔴 Giả lập PIR: Người dùng RỜI KHỎI BÀN.');
      };

      // Simulation mode generator
      useEffect(() => {
        if (connectionMode !== 'simulated') return;

        const interval = setInterval(() => {
          const noiseHum = (Math.random() - 0.5) * 0.8;
          const newH = +(Math.max(30, Math.min(90, humidity + noiseHum))).toFixed(1);
          setHumidity(newH);

          const timeStr = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          setHistory(prev => [...prev.slice(1), { time: timeStr, temp: newT, humidity: newH }]);
        }, 2500);

        return () => clearInterval(interval);
      }, [connectionMode, simTemp, simMotion]);

      // Auto-scroll terminal log
      useEffect(() => {
        if (logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs]);

      // --- Web Serial API Connection Handler ---
      const handleConnectWebSerial = async () => {
        if (!('serial' in navigator)) {
          alert('Trình duyệt chưa hỗ trợ Web Serial API. Vui lòng dùng Chrome, Edge hoặc Opera.');
          return;
        }

        try {
          const port = await navigator.serial.requestPort();
          await port.open({ baudRate: 115200 });
          serialPortRef.current = port;
          
          setIsConnected(true);
          setConnectionMode('web_serial');

          addLog('success', `Đã kết nối thành công với bo mạch ESP8266 qua Serial (Baudrate: 115200).`);

          const textDecoder = new TextDecoderStream();
          const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
          const reader = textDecoder.readable.getReader();
          serialReaderRef.current = reader;

          let buffer = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              buffer += value;
              const lines = buffer.split('\n');
              buffer = lines.pop();

              for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed) {
                  processIncomingSerialData(trimmed);
                }
              }
            }
          }
        } catch (err) {
          console.error('Serial connection error:', err);
          if (err.name !== 'NotFoundError') {
            addLog('error', `Lỗi kết nối Serial: ${err.message}`);
          }
        }
      };

      const handleDisconnectWebSerial = async () => {
        try {
          if (serialReaderRef.current) {
            await serialReaderRef.current.cancel();
          }
          if (serialPortRef.current) {
            await serialPortRef.current.close();
          }
        } catch (e) {
          console.error('Disconnect error:', e);
        }
        setIsConnected(false);
        setConnectionMode('simulated');
        addLog('info', 'Đã ngắt kết nối Serial. Chuyển về chế độ giả lập ESP8266.');
      };

      // Process incoming line from ESP8266 Serial
      const processIncomingSerialData = (line) => {
        addLog('rx', `RX ← ${line}`);
        try {
          if (line.startsWith('{') && line.endsWith('}')) {
            const data = JSON.parse(line);
            
            // 1. Sync sensors (temp, humidity, motion)
            if (data.temp !== undefined) setTemperature(+data.temp);
            if (data.humidity !== undefined) setHumidity(+data.humidity);
            if (data.motion !== undefined) setMotionState(+data.motion);

            // 2. Sync Time
            if (data.time) {
              const timeParts = data.time.split(':').map(Number);
              if (timeParts.length === 3 && !timeParts.some(isNaN)) {
                const [h, m, s] = timeParts;
                lastHardwareTimeRef.current = Date.now();
                setCurrentTime(prev => {
                  const next = new Date(prev);
                  next.setHours(h, m, s);
                  return next;
                });
              }
            }

            // 3. Sync Date
            if (data.date) {
              const dateParts = data.date.split('/').map(Number);
              if (dateParts.length === 3 && !dateParts.some(isNaN)) {
                const [d, mo, y] = dateParts;
                setCurrentTime(prev => {
                  const next = new Date(prev);
                  next.setFullYear(y, mo - 1, d);
                  return next;
                });
              }
            }

            const timeStr = data.time || new Date().toLocaleTimeString('vi-VN');
            setHistory(prev => [...prev.slice(1), {
              time: timeStr,
              temp: data.temp !== undefined ? +data.temp : temperature
            }]);
          }
        } catch (err) {
          if (line.includes('TEMP:')) {
            const matchT = line.match(/TEMP:([\d.]+)/);
            if (matchT) setTemperature(+matchT[1]);
          }
        }
      };

      // Send command to ESP8266 Serial
      const sendSerialCommand = async (cmd) => {
        addLog('tx', `TX → ${cmd}`);
        if (connectionMode === 'web_serial' && serialPortRef.current && serialPortRef.current.writable) {
          const encoder = new TextEncoder();
          const writer = serialPortRef.current.writable.getWriter();
          await writer.write(encoder.encode(cmd + '\n'));
          writer.releaseLock();
        } else {
          setTimeout(() => {
            addLog('info', `Simulated ACK: Đã nhận lệnh ESP8266 [${cmd}]`);
          }, 200);
        }
      };

      // Sync Computer Time to ESP8266
      const handleSyncComputerTime = () => {
        const now = new Date();
        setCurrentTime(now);
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const mo = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();

        sendSerialCommand(`SET_TIME:${h}:${m}:${s}`);
        setTimeout(() => {
          sendSerialCommand(`SET_DATE:${d}/${mo}/${y}`);
        }, 150);

        addLog('success', `Đã đồng bộ Giờ & Ngày máy tính (${h}:${m}:${s} ${d}/${mo}/${y}) xuống ESP8266!`);
      };

      const saveGeminiKey = (key) => {
        setGeminiKey(key);
        localStorage.setItem('gemini_api_key', key);
        addLog('success', '🔑 Đã lưu Gemini API Key thành công!');
      };

      const addLog = (type, text) => {
        setLogs(prev => [...prev.slice(-99), {
          id: Date.now() + Math.random(),
          type,
          text,
          time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        }]);
      };

      const formatTimer = (seconds) => {
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        return `${m}:${s}`;
      };

      const displayTemp = unit === 'C' ? temperature.toFixed(1) : ((temperature * 9 / 5) + 32).toFixed(1);
      const displayTempUnit = unit === 'C' ? '°C' : '°F';

      const getTempStatus = (t) => {
        if (t < 20) return { label: 'Trời Mát / Lạnh', color: 'text-blue-400 bg-blue-500/10 border-blue-500/30' };
        if (t <= 29) return { label: 'Thích Hợp Học Bài', color: 'text-emerald-400 bg-emerald-500/10 border-emerald-500/30' };
        if (t <= 34) return { label: 'Hơi Oi Nóng', color: 'text-amber-400 bg-amber-500/10 border-amber-500/30' };
        return { label: 'Cảnh Báo Nóng', color: 'text-rose-400 bg-rose-500/10 border-rose-500/30' };
      };

      const tempStatus = getTempStatus(temperature);
      const dateString = currentTime.toLocaleDateString('vi-VN', {
        weekday: 'long',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });

      const hoursStr = String(currentTime.getHours()).padStart(2, '0');
      const minsStr = String(currentTime.getMinutes()).padStart(2, '0');
      const secsStr = String(currentTime.getSeconds()).padStart(2, '0');

      return (
        <div className={`min-h-screen flex flex-col justify-between max-w-7xl mx-auto px-4 py-6 md:px-8 md:py-8 space-y-6 transition-colors duration-500 ${
          alarmTriggered ? 'bg-rose-950/40' : ''
        }`}>
          
          {/* --- TOP HEADER BAR --- */}
          <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 p-5 rounded-2xl bg-zinc-900/80 border border-zinc-800 shadow-xl backdrop-blur-md">
            <div className="flex items-center space-x-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <IconSparkles className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                  Smart AI Desk Companion <span className="text-xs px-2 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 font-mono font-normal">ESP8266 + Voice AI</span>
                </h1>
                <p className="text-xs text-zinc-400">Trạm Trợ Lý Giám Sát Học Tập, Môi Trường & An Ninh Góc Làm Việc</p>
              </div>
            </div>

            {/* Connection Actions */}
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex items-center space-x-2 px-3 py-1.5 rounded-xl bg-zinc-950/60 border border-zinc-800 text-xs font-mono">
                <span className={`w-2.5 h-2.5 rounded-full ${isConnected ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`} />
                <span className="text-zinc-300">
                  {isConnected ? `ESP8266 Connected (Serial)` : `Giả Lập (Simulation Mode)`}
                </span>
              </div>

              {isConnected ? (
                <button
                  onClick={handleDisconnectWebSerial}
                  className="px-4 py-2 text-xs font-medium rounded-xl bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 transition-all btn-tactile flex items-center space-x-2"
                >
                  <IconUsb className="w-4 h-4" />
                  <span>Ngắt Kết Nối Serial</span>
                </button>
              ) : (
                <button
                  onClick={handleConnectWebSerial}
                  className="px-4 py-2 text-xs font-medium rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/25 transition-all btn-tactile flex items-center space-x-2"
                >
                  <IconUsb className="w-4 h-4" />
                  <span>Kết Nối Hardware ESP8266</span>
                </button>
              )}

              <button
                onClick={() => setUnit(unit === 'C' ? 'F' : 'C')}
                className="px-3 py-2 text-xs font-mono font-semibold rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-700 transition-all btn-tactile"
              >
                {unit === 'C' ? 'Đổi qua °F' : 'Đổi qua °C'}
              </button>
            </div>
          </header>

          {/* --- SMART MODE SELECTOR STRIP --- */}
          <div className="p-4 rounded-2xl bg-zinc-900/90 border border-zinc-800 flex flex-wrap items-center justify-between gap-4 shadow-lg">
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-xs font-semibold uppercase tracking-wider text-zinc-400 mr-1">Chế Độ:</span>
              
              <button
                onClick={() => switchMode('NORMAL')}
                className={`px-3.5 py-2 text-xs font-semibold rounded-xl transition-all btn-tactile flex items-center space-x-1.5 ${
                  activeMode === 'NORMAL' ? 'bg-zinc-800 text-white border border-zinc-700 shadow-md' : 'text-zinc-400 hover:bg-zinc-800/50'
                }`}
              >
                <span>⏰ Bình Thường</span>
              </button>

              <button
                onClick={() => setShowStudyModal(true)}
                className={`px-3.5 py-2 text-xs font-semibold rounded-xl transition-all btn-tactile flex items-center space-x-1.5 ${
                  activeMode === 'STUDY' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/25 border border-indigo-500' : 'text-zinc-400 hover:bg-zinc-800/50'
                }`}
              >
                <span>📖 Chế Độ Học Tập</span>
              </button>

              {/* Button to re-open method selection modal when in STUDY mode */}
              {activeMode === 'STUDY' && (
                <button
                  onClick={() => setShowStudyModal(true)}
                  className="px-3 py-2 text-xs font-semibold rounded-xl bg-zinc-950 text-indigo-300 border border-indigo-500/40 hover:border-indigo-400 transition-all flex items-center space-x-1"
                >
                  <span>⚡ {activeMethod.name} ({activeMethod.focusMins}p/{activeMethod.breakMins}p)</span>
                  <span className="text-zinc-500 text-[10px]">⚙️ Đổi</span>
                </button>
              )}

              <button
                onClick={() => switchMode('SECURITY')}
                className={`px-3.5 py-2 text-xs font-semibold rounded-xl transition-all btn-tactile flex items-center space-x-1.5 ${
                  activeMode === 'SECURITY' ? 'bg-rose-600 text-white shadow-lg shadow-rose-500/25 border border-rose-500' : 'text-zinc-400 hover:bg-zinc-800/50'
                }`}
              >
                <span>🛡️ An Ninh Đi Vắng</span>
              </button>
            </div>

            {/* Mode Specific Status Badge & Trigger Break Action */}
            <div className="flex items-center space-x-3">
              {activeMode === 'STUDY' && (
                <div className="flex flex-wrap items-center gap-2">
                  <div className={`px-3.5 py-1.5 rounded-xl border font-mono text-xs flex items-center space-x-2 ${
                    studyPhase === 'FOCUS' ? 'bg-indigo-500/15 border-indigo-500/30 text-indigo-300' :
                    studyPhase === 'READY_FOR_BREAK' ? 'bg-amber-500/20 border-amber-500/50 text-amber-300 animate-pulse' :
                    'bg-emerald-500/15 border-emerald-500/30 text-emerald-300'
                  }`}>
                    <span className={`w-2 h-2 rounded-full animate-ping ${
                      studyPhase === 'FOCUS' ? 'bg-indigo-400' : studyPhase === 'READY_FOR_BREAK' ? 'bg-amber-400' : 'bg-emerald-400'
                    }`} />
                    <span>
                      {studyPhase === 'FOCUS' && `📖 Focus (${activeMethod.focusMins}m): `}
                      {studyPhase === 'READY_FOR_BREAK' && `🎉 Hoàn thành Focus! Sẵn sàng nghỉ `}

                  {connectionMode === 'web_serial' && (
                    <p className="text-xs text-amber-400 bg-amber-500/10 p-2.5 rounded-xl border border-amber-500/20">
                      ⚡ Đang kết nối với ESP8266 thật. Thanh giả lập tạm thời bị khóa.
                    </p>
                  )}
                </div>

                <div className="p-5 rounded-2xl bg-zinc-950/80 border border-zinc-800/80 space-y-4">
                  <h4 className="text-sm font-semibold text-white">Gửi Lệnh Lên ESP8266</h4>
                  <div className="grid grid-cols-2 gap-2.5">
                    <button
                      onClick={handleSyncComputerTime}
                      className="p-2.5 text-xs font-medium rounded-xl bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-300 border border-indigo-500/30 text-left transition-all btn-tactile"
                    >
                      <div className="font-semibold text-white">SET_TIME & DATE</div>
                      <div className="text-[10px] text-zinc-400">Đồng bộ giờ chuẩn</div>
                    </button>

                    <button
                      onClick={() => sendSerialCommand('READ_TEMP')}
                      className="p-2.5 text-xs font-medium rounded-xl bg-zinc-900 hover:bg-zinc-800 text-zinc-200 border border-zinc-800 text-left transition-all btn-tactile"
                    >
                      <div className="font-semibold text-white">READ_TEMP</div>
                      <div className="text-[10px] text-zinc-500">Đọc cảm biến</div>
                    </button>

                    <button
                      onClick={() => sendSerialCommand('RESET_ESP')}
                      className="p-2.5 text-xs font-medium rounded-xl bg-zinc-900 hover:bg-zinc-800 text-rose-300 border border-zinc-800 text-left transition-all btn-tactile"
                    >
                      <div className="font-semibold text-rose-400">RESET_ESP</div>
                      <div className="text-[10px] text-zinc-500">Khởi động lại</div>
                    </button>

                    <button
                      onClick={() => sendSerialCommand('PING')}
                      className="p-2.5 text-xs font-medium rounded-xl bg-zinc-900 hover:bg-zinc-800 text-zinc-200 border border-zinc-800 text-left transition-all btn-tactile"
                    >
                      <div className="font-semibold text-white">PING</div>
                      <div className="text-[10px] text-zinc-500">Kiểm tra kết nối</div>
                    </button>
                  </div>
                </div>

              </div>
            )}

            {/* TAB CONTENT 2: DUAL-METRIC ENVIRONMENTAL CHART (TEMP & HUMIDITY) */}
            {activeTab === 'chart' && (
              <div className="space-y-4">
                <div className="flex flex-wrap items-center justify-between gap-3 border-b border-zinc-800 pb-3">
                  <div>
                    <h4 className="text-sm font-bold text-white flex items-center space-x-2">
                      <IconActivity className="w-4 h-4 text-indigo-400" />
                      <span>Đồ Thị Biến Thiên Nhiệt Độ & Độ Ẩm Thời Gian Thực</span>
                    </h4>
                    <p className="text-xs text-zinc-400">Theo dõi 20 mẫu đo liên tục từ cảm biến DHT11 (ESP8266)</p>
                  </div>

                  {/* Summary Stat Badges & Legends */}
                  <div className="flex flex-wrap items-center gap-3 text-xs font-mono">
                    <div className="flex items-center space-x-1.5 px-3 py-1 rounded-xl bg-indigo-500/10 border border-indigo-500/30 text-indigo-300">
                      <span className="w-2.5 h-2.5 rounded-full bg-indigo-500" />
                      <span>Nhiệt độ: <strong className="text-white">{temperature}°C</strong></span>
                    </div>

                    <div className="flex items-center space-x-1.5 px-3 py-1 rounded-xl bg-cyan-500/10 border border-cyan-500/30 text-cyan-300">
                      <span className="w-2.5 h-2.5 rounded-full bg-cyan-400" />
                      <span>Độ ẩm: <strong className="text-white">{humidity}%</strong></span>
                    </div>
                  </div>
                </div>

                {/* GRAPH FRAME */}
                <div className="h-72 w-full bg-zinc-950 rounded-2xl border border-zinc-800 p-5 relative flex flex-col justify-between overflow-hidden shadow-inner">
                  
                  {/* Background Grid Lines */}
                  <div className="absolute inset-0 p-5 pointer-events-none flex flex-col justify-between opacity-30">
                    <div className="border-b border-dashed border-zinc-700 w-full flex justify-between text-[10px] font-mono text-zinc-500">
                      <span>40°C / 80%</span>
                    </div>
                    <div className="border-b border-dashed border-zinc-700 w-full flex justify-between text-[10px] font-mono text-zinc-500">
                      <span>30°C / 60%</span>
                    </div>
                    <div className="border-b border-dashed border-zinc-700 w-full flex justify-between text-[10px] font-mono text-zinc-500">
                      <span>20°C / 40%</span>
                    </div>
                    <div className="border-b border-dashed border-zinc-700 w-full flex justify-between text-[10px] font-mono text-zinc-500">
                      <span>10°C / 20%</span>
                    </div>
                  </div>

                  <svg className="w-full h-full overflow-visible z-10" viewBox="0 0 500 180" preserveAspectRatio="none">
                    <defs>
                      <linearGradient id="tempFill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#6366f1" stopOpacity="0.4" />
                        <stop offset="100%" stopColor="#6366f1" stopOpacity="0.0" />
                      </linearGradient>

                      <linearGradient id="humFill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#06b6d4" stopOpacity="0.3" />
                        <stop offset="100%" stopColor="#06b6d4" stopOpacity="0.0" />
                      </linearGradient>
                    </defs>

                    {(() => {
                      if (!history || history.length === 0) return null;

                      // Temperature curve (Scale: 0-50 °C)
                      const tempPointsArr = history.map((item, idx) => {
                        const x = (idx / (history.length - 1)) * 500;
                        const y = 180 - Math.max(0, Math.min(180, (item.temp / 50) * 180));
                        return { x, y, temp: item.temp };
                      });

                      const tempPolyline = tempPointsArr.map(p => `${p.x},${p.y}`).join(' ');
                      const tempArea = `0,180 ${tempPolyline} 500,180`;

                      // Humidity curve (Scale: 0-100 %)
                      const humPointsArr = history.map((item, idx) => {
                        const x = (idx / (history.length - 1)) * 500;
                        const humVal = item.humidity || 60;
                        const y = 180 - Math.max(0, Math.min(180, (humVal / 100) * 180));
                        return { x, y, hum: humVal };
                      });

                      const humPolyline = humPointsArr.map(p => `${p.x},${p.y}`).join(' ');
                      const humArea = `0,180 ${humPolyline} 500,180`;

                      const lastTempPt = tempPointsArr[tempPointsArr.length - 1];
                      const lastHumPt = humPointsArr[humPointsArr.length - 1];

                      return (
                        <g>
                          {/* Humidity Area & Line (Cyan) */}
                          <polygon points={humArea} fill="url(#humFill)" />
                          <polyline
                            fill="none"
                            stroke="#06b6d4"
                            strokeWidth="2.5"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            points={humPolyline}
                          />
                          {lastHumPt && (
                            <circle cx={lastHumPt.x} cy={lastHumPt.y} r="5" fill="#06b6d4" className="animate-ping" />
                          )}

                          {/* Temperature Area & Line (Indigo) */}
                          <polygon points={tempArea} fill="url(#tempFill)" />
                          <polyline
                            fill="none"
                            stroke="#6366f1"
                            strokeWidth="3"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            points={tempPolyline}
                          />
                          {lastTempPt && (
                            <circle cx={lastTempPt.x} cy={lastTempPt.y} r="5" fill="#818cf8" className="animate-ping" />
                          )}
                        </g>
                      );
                    })()}
                  </svg>
                </div>

                {/* X-AXIS TIMESTAMPS BAR */}
                <div className="flex justify-between text-[11px] font-mono text-zinc-500 px-2 pt-1 border-t border-zinc-800">
                  <span>🕒 {history[0]?.time || 'Bắt đầu'}</span>
                  <span>{history[Math.floor(history.length / 2)]?.time || 'Giữa phiên'}</span>
                  <span>Hiện tại: {history[history.length - 1]?.time || 'Mới nhất'}</span>
                </div>
              </div>
            )}

            {/* TAB CONTENT 3: LOGS */}
            {activeTab === 'logs' && (
              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <h4 className="text-sm font-semibold text-white flex items-center space-x-2">
                    <IconTerminal className="w-4 h-4 text-emerald-400" />
                    <span>Nhật Ký Serial JSON từ ESP8266</span>
                  </h4>
                  <button
                    onClick={() => setLogs([])}
                    className="text-xs text-zinc-400 hover:text-white px-2.5 py-1 bg-zinc-800 rounded-lg"
                  >
                    Xóa Logs
                  </button>
                </div>

                <div 
                  ref={logContainerRef}
                  className="h-64 bg-zinc-950 rounded-2xl border border-zinc-800 p-4 font-mono text-xs overflow-y-auto space-y-1.5 custom-scrollbar"
                >
                  {logs.map(log => (
                    <div key={log.id} className="flex items-start space-x-2 leading-relaxed">
                      <span className="text-zinc-600 select-none">[{log.time}]</span>
                      <span className={
                        log.type === 'rx' ? 'text-emerald-400' :
                        log.type === 'tx' ? 'text-sky-400' :
                        log.type === 'error' ? 'text-rose-400 font-bold' :
                        log.type === 'success' ? 'text-indigo-300' : 'text-zinc-400'
                      }>
                        {log.text}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* TAB CONTENT 4: WIRING DIAGRAM INFO */}
            {activeTab === 'wiring' && (
              <div className="space-y-4 text-xs text-zinc-300 leading-relaxed">
                <h4 className="text-sm font-semibold text-white">Sơ Đồ Đấu Dây Chuẩn Bo Mạch ESP8266 (NodeMCU)</h4>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="p-4 rounded-2xl bg-zinc-950 border border-zinc-800 space-y-2">
                    <h5 className="font-semibold text-indigo-400">1. Cảm Biến Nhiệt Độ & Độ Ẩm DHT11</h5>
                    <ul className="list-disc list-inside space-y-1 text-zinc-400 font-mono">
                      <li>DATA → NodeMCU Pin D3 (GPIO 0)</li>
                      <li>VCC → 3.3V hoặc 5V</li>
                      <li>GND → GND</li>
                    </ul>
                  </div>

                  <div className="p-4 rounded-2xl bg-zinc-950 border border-zinc-800 space-y-2">
                    <h5 className="font-semibold text-purple-400">2. Cảm Biến Chuyển Động PIR HC-SR501</h5>
                    <ul className="list-disc list-inside space-y-1 text-zinc-400 font-mono">
                      <li>OUT → NodeMCU Pin D2 (GPIO 4)</li>
                      <li>VCC → 5V</li>
                      <li>GND → GND</li>
                    </ul>
                  </div>
                </div>
              </div>
            )}

          </div>

          {/* --- STUDY METHOD SELECTION MODAL (MYPODO JUMP SCREEN) --- */}
          {showStudyModal && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-zinc-900 border border-indigo-500/30 rounded-3xl max-w-3xl w-full p-6 shadow-2xl space-y-6 max-h-[90vh] overflow-y-auto border-t-4 border-t-indigo-500 custom-scrollbar">
                
                {/* Modal Header */}
                <div className="flex items-start justify-between border-b border-zinc-800 pb-4">
                  <div className="space-y-1">
                    <div className="flex items-center space-x-2">
                      <span className="px-2.5 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300 text-xs font-mono font-semibold border border-indigo-500/30">
                        SMART FOCUS SYSTEM
                      </span>
                    </div>
                    <h3 className="text-xl font-bold text-white tracking-tight flex items-center gap-2">
                      ⚙️ Chọn Phương Pháp Học Tập & Làm Việc Tối Ưu
                    </h3>
                    <p className="text-xs text-zinc-400">Lựa chọn tỷ lệ thời gian Tập trung và Nghỉ ngơi phù hợp với tính chất tác vụ của bạn.</p>
                  </div>
                  <button
                    onClick={() => setShowStudyModal(false)}
                    className="p-2 text-zinc-400 hover:text-white rounded-xl hover:bg-zinc-800 transition-all"
                  >
                    ✕
                  </button>
                </div>

                {/* 7 Methods Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {FOCUS_METHODS.map((m) => {
                    const isSelected = selectedMethodId === m.id;
                    return (
                      <div
                        key={m.id}
                        onClick={() => setSelectedMethodId(m.id)}
                        className={`p-4 rounded-2xl border transition-all cursor-pointer flex flex-col justify-between space-y-3 ${
                          isSelected
                            ? 'bg-indigo-950/40 border-indigo-500 shadow-lg shadow-indigo-500/10 ring-1 ring-indigo-500'
                            : 'bg-zinc-950/60 border-zinc-800 hover:border-zinc-700 hover:bg-zinc-950'
                        }`}
                        style={{ borderLeftWidth: isSelected ? '6px' : '4px', borderLeftColor: m.color }}
                      >
                        <div className="space-y-1">
                          <div className="flex items-center justify-between">
                            <span className="font-bold text-sm text-white flex items-center gap-1.5">
                              {m.name}
                            </span>
                            <span className="px-2 py-0.5 rounded-lg bg-zinc-900 border border-zinc-800 text-[11px] font-mono text-indigo-300">
                              {m.focusMins}p Học + {m.breakMins}p Nghỉ
                            </span>
                          </div>
                          <h5 className="text-xs font-semibold" style={{ color: m.color }}>{m.title}</h5>
                          <p className="text-[11px] text-zinc-400 leading-relaxed">{m.desc}</p>
                        </div>

                        <div className="flex items-center justify-between pt-2 border-t border-zinc-900/80">
                          <span className="text-[10px] text-zinc-500 font-mono">Chu kỳ đếm ngược tự động</span>
                          <span className={`w-4 h-4 rounded-full border flex items-center justify-center ${
                            isSelected ? 'border-indigo-400 bg-indigo-500' : 'border-zinc-700'
                          }`}>
                            {isSelected && <span className="w-1.5 h-1.5 rounded-full bg-white" />}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Modal Footer Actions */}
                <div className="flex items-center justify-between pt-4 border-t border-zinc-800">
                  <button
                    onClick={() => setShowStudyModal(false)}
                    className="px-4 py-2.5 text-xs font-semibold rounded-xl text-zinc-400 hover:text-white hover:bg-zinc-800 transition-all"
                  >
                    Hủy bỏ
                  </button>

                  <button
                    onClick={() => {
                      switchMode('STUDY', selectedMethodId);
                      setShowStudyModal(false);
                    }}
                    className="px-6 py-2.5 text-xs font-bold rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-xl shadow-indigo-500/25 hover:from-indigo-400 hover:to-purple-500 transition-all btn-tactile flex items-center space-x-2"
                  >
                    <span>🚀 BẮT ĐẦU PHIÊN HỌC TẬP ({FOCUS_METHODS.find(m => m.id === selectedMethodId)?.focusMins} PHÚT)</span>
                  </button>
                </div>

              </div>
            </div>
          )}

          <footer className="text-center text-xs text-zinc-500 pt-2 pb-4">
            <p>Smart AI Desk Companion — Voice AI Agent & Environmental Monitoring (ESP8266)</p>
          </footer>

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
